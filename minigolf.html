<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>미니골프 3D — Mini Golf</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#bfe3f5;overflow:hidden;font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:#fff;}
  #c{display:block;width:100vw;height:100vh;touch-action:none;}
  #hud{position:fixed;top:10px;left:0;right:0;display:flex;justify-content:center;gap:14px;pointer-events:none;z-index:5;
    font-weight:800;text-shadow:0 2px 4px rgba(0,0,0,.4);}
  .pill{background:rgba(20,40,30,.55);padding:6px 14px;border-radius:999px;font-size:14px;}
  .pill b{color:#ffe14d;}
  #pwwrap{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;width:220px;height:14px;background:rgba(0,0,0,.4);border-radius:8px;overflow:hidden;display:none;z-index:5;border:2px solid rgba(255,255,255,.5);}
  #pwbar{height:100%;width:0;background:linear-gradient(90deg,#7ad65b,#ffe14d,#ff5b4d);}
  #msg{position:fixed;top:60px;left:0;right:0;text-align:center;font-size:24px;font-weight:900;color:#ffe14d;text-shadow:0 3px 0 #6a4b00,0 0 16px rgba(255,210,60,.6);z-index:5;pointer-events:none;opacity:0;transition:opacity .3s;}
  .panel{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;
    background:rgba(10,30,40,.8);backdrop-filter:blur(4px);z-index:10;padding:24px;}
  .panel.hidden{display:none;}
  .panel h1{font-size:34px;color:#ffe14d;text-shadow:0 3px 0 #6a4b00;}
  .panel h2{font-size:24px;color:#9ef07a;}
  .panel p{font-size:14px;color:#dff;line-height:1.7;max-width:360px;}
  .btn{padding:13px 38px;background:linear-gradient(180deg,#7ad65b,#3fa83a);color:#0e2c0a;border:2px solid #225c1c;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 6px 0 #225c1c;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #225c1c;}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#bfe3f5;color:#2a6;font-weight:800;font-size:18px;z-index:20;}
  #score-tbl{font-size:13px;color:#dff;border-collapse:collapse;}
  #score-tbl td{padding:2px 10px;}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="loading">3D 코스 불러오는 중…</div>
  <div id="hud">
    <span class="pill">HOLE <b id="hh">1</b>/<b id="ht">6</b></span>
    <span class="pill">PAR <b id="hpar">2</b></span>
    <span class="pill">타수 <b id="hstroke">0</b></span>
    <span class="pill">합계 <b id="htotal">E</b></span>
  </div>
  <div id="msg"></div>
  <div id="pwwrap"><div id="pwbar"></div></div>

  <div id="menu" class="panel hidden">
    <h1>⛳ 미니골프 3D</h1>
    <p>공을 <b style="color:#ffe14d">드래그해서 뒤로 당겼다 놓으면</b> 그 반대 방향으로 굴러갑니다.<br>당기는 길이 = 파워. 벽에 튕기고 풍차·장애물을 피해 홀에 넣으세요!<br>총 6홀, 타수가 적을수록 좋아요.</p>
    <div id="stat" style="font-size:13px;color:#cfe;">최고 합계 <b id="bestTotal" style="color:#ffe14d;">-</b></div>
    <button id="playBtn" class="btn">▶ 시작</button>
    <p style="font-size:11px;color:#9bd;">PC: 마우스 드래그 · 모바일: 터치 드래그</p>
  </div>
  <div id="result" class="panel hidden">
    <h1>🏁 라운드 종료!</h1>
    <table id="score-tbl"></table>
    <h2 id="resTotal"></h2>
    <button id="resBtn" class="btn">↻ 다시 플레이</button>
  </div>

<script>// 순수 물리 (THREE 의존 없음) — 노드 테스트 가능
(function(){
  const TILE=1, BR=0.16, HOLE_R=0.30, REST=0.62, STOP=0.05, SINK=2.6;
  function makeGame(HOLES){
    const G={ holes:HOLES, idx:0, cells:[], cols:0, rows:0, holePos:{x:0,z:0}, startPos:{x:0,z:0},
      obstacles:[], windmills:[], ball:{x:0,z:0,vx:0,vz:0,moving:false}, strokes:0, sunk:false, t:0, lastSafe:{x:0,z:0} };
    function loadHole(i){
      G.idx=i; const grid=HOLES[i].grid; G.rows=grid.length; G.cols=Math.max(...grid.map(r=>r.length));
      G.cells=[]; G.obstacles=[]; G.windmills=[]; G.strokes=0; G.sunk=false; G.t=0;
      for(let r=0;r<G.rows;r++){ const row=[]; const line=grid[r];
        for(let c=0;c<G.cols;c++){ const ch=line[c]||'.'; const green='GSHBWDC'.indexOf(ch)>=0; row.push(green);
          if(ch==='S') G.startPos={x:c*TILE,z:r*TILE};
          else if(ch==='H') G.holePos={x:c*TILE,z:r*TILE};
          else if(ch==='B') G.obstacles.push({x:c*TILE,z:r*TILE,r:0.34,kind:'block'});
          else if(ch==='D') G.obstacles.push({x:c*TILE,z:r*TILE,r:0.30,kind:'diamond'});
          else if(ch==='C') G.obstacles.push({x:c*TILE,z:r*TILE,r:0.40,kind:'castle'});
          else if(ch==='W') G.windmills.push({x:c*TILE,z:r*TILE,ang:0,spd:1.9,L:0.66,tw:0.07,base:0.2});
        }
        G.cells.push(row);
      }
      G.ball={x:G.startPos.x,z:G.startPos.z,vx:0,vz:0,moving:false};
      G.lastSafe={x:G.ball.x,z:G.ball.z};
      return G;
    }
    function greenCell(c,r){ return c>=0&&r>=0&&r<G.rows&&c<G.cols&&G.cells[r][c]; }
    function greenWorld(x,z){ return greenCell(Math.round(x/TILE),Math.round(z/TILE)); }
    function putt(vx,vz){ if(G.ball.moving||G.sunk) return false; G.ball.vx=vx; G.ball.vz=vz; G.ball.moving=true; G.strokes++; return true; }
    function speed(){ return Math.hypot(G.ball.vx,G.ball.vz); }

    function collideObstacles(){
      const b=G.ball;
      for(const o of G.obstacles){ const dx=b.x-o.x, dz=b.z-o.z; let d=Math.hypot(dx,dz); const min=BR+o.r;
        if(d<min){ d=d||0.0001; const nx=dx/d,nz=dz/d; b.x=o.x+nx*min; b.z=o.z+nz*min; const vn=b.vx*nx+b.vz*nz; b.vx=(b.vx-2*vn*nx)*REST; b.vz=(b.vz-2*vn*nz)*REST; } }
      for(const w of G.windmills){
        // base
        let dx=b.x-w.x, dz=b.z-w.z, d=Math.hypot(dx,dz), min=BR+w.base;
        if(d<min){ d=d||1e-4; const nx=dx/d,nz=dz/d; b.x=w.x+nx*min; b.z=w.z+nz*min; const vn=b.vx*nx+b.vz*nz; b.vx=(b.vx-2*vn*nx)*REST; b.vz=(b.vz-2*vn*nz)*REST; }
        // blades (2 perpendicular bars)
        for(let k=0;k<2;k++){ const a=w.ang+k*Math.PI/2; const ux=Math.cos(a), uz=Math.sin(a);
          let t=(b.x-w.x)*ux+(b.z-w.z)*uz; t=Math.max(-w.L,Math.min(w.L,t));
          const cx=w.x+ux*t, cz=w.z+uz*t; let ddx=b.x-cx, ddz=b.z-cz, dd=Math.hypot(ddx,ddz), mm=BR+w.tw;
          if(dd<mm){ dd=dd||1e-4; const nx=ddx/dd,nz=ddz/dd; b.x=cx+nx*mm; b.z=cz+nz*mm; const vn=b.vx*nx+b.vz*nz; b.vx=(b.vx-2*vn*nx)*REST; b.vz=(b.vz-2*vn*nz)*REST; } }
      }
    }

    function update(dt){
      G.t+=dt;
      for(const w of G.windmills) w.ang+=w.spd*dt;
      if(!G.ball.moving) return;
      const b=G.ball;
      const sp=speed(); const steps=Math.max(1,Math.ceil(sp*dt/0.06)); const sdt=dt/steps;
      for(let s=0;s<steps;s++){
        // X
        let nx=b.x+b.vx*sdt; const row=Math.round(b.z/TILE);
        let leadC=Math.round((nx+Math.sign(b.vx)*BR)/TILE);
        if(b.vx!==0 && !greenCell(leadC,row)){ const curC=Math.round(b.x/TILE); b.x=(curC+Math.sign(b.vx)*0.5)*TILE - Math.sign(b.vx)*BR; b.vx=-b.vx*REST; }
        else b.x=nx;
        // Z
        let nz=b.z+b.vz*sdt; const col=Math.round(b.x/TILE);
        let leadR=Math.round((nz+Math.sign(b.vz)*BR)/TILE);
        if(b.vz!==0 && !greenCell(col,leadR)){ const curR=Math.round(b.z/TILE); b.z=(curR+Math.sign(b.vz)*0.5)*TILE - Math.sign(b.vz)*BR; b.vz=-b.vz*REST; }
        else b.z=nz;
        collideObstacles();
        // hole
        const hd=Math.hypot(b.x-G.holePos.x,b.z-G.holePos.z);
        if(hd<HOLE_R){ const cs=speed(); if(cs<SINK){ G.sunk=true; b.moving=false; b.x=G.holePos.x; b.z=G.holePos.z; b.vx=b.vz=0; return; }
          else { b.vx+=(G.holePos.x-b.x)*6*sdt; b.vz+=(G.holePos.z-b.z)*6*sdt; } }
        if(greenWorld(b.x,b.z)){ G.lastSafe.x=b.x; G.lastSafe.z=b.z; }
      }
      // friction
      const fr=Math.exp(-1.2*dt); b.vx*=fr; b.vz*=fr;
      if(speed()<STOP){ b.vx=0; b.vz=0; b.moving=false; if(!greenWorld(b.x,b.z)){ b.x=G.lastSafe.x; b.z=G.lastSafe.z; } }
    }
    return { G, loadHole, putt, update, greenCell, greenWorld, speed,
      consts:{TILE,BR,HOLE_R}, state:()=>({idx:G.idx,strokes:G.strokes,sunk:G.sunk,moving:G.ball.moving,x:G.ball.x,z:G.ball.z,vx:G.ball.vx,vz:G.ball.vz,speed:speed()}) };
  }
  if(typeof window!=='undefined') window.GOLF_MAKE=makeGame;
  if(typeof module!=='undefined') module.exports={makeGame};
})();
</script>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const HOLES = window.__GOLF_HOLES;
const ASSETS = window.__GOLF || {};
const game = window.GOLF_MAKE(HOLES);
const { TILE, BR, HOLE_R } = game.consts;

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
const scene = new THREE.Scene();
scene.background = new THREE.Color('#bfe3f5');
scene.fog = new THREE.Fog('#bfe3f5', 18, 40);
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
addEventListener('resize',resize); resize();

const sun = new THREE.DirectionalLight(0xffffff, 1.5); sun.position.set(6,14,4); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024); sun.shadow.camera.left=-16; sun.shadow.camera.right=16; sun.shadow.camera.top=16; sun.shadow.camera.bottom=-16; sun.shadow.camera.near=1; sun.shadow.camera.far=50; sun.shadow.bias=-0.0008;
scene.add(sun); scene.add(new THREE.HemisphereLight(0xffffff,0x557755,0.7));

// ===== 모델 로드 =====
const loader = new GLTFLoader();
const MODELS = {};
async function loadAll(){
  const names = Object.keys(ASSETS);
  await Promise.all(names.map(async n=>{
    try{ const g = await loader.loadAsync(ASSETS[n]); g.scene.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; } }); MODELS[n]=g.scene; }
    catch(e){ console.warn('model fail',n,e); }
  }));
}
function inst(name){ const m=MODELS[name]; if(!m) return null; const c=m.clone(true); return c; }
function fitModel(obj, targetXZ, alignTop){
  const box=new THREE.Box3().setFromObject(obj); const size=new THREE.Vector3(); box.getSize(size);
  const s = targetXZ / Math.max(size.x, size.z || 0.001); obj.scale.setScalar(s);
  const box2=new THREE.Box3().setFromObject(obj); 
  if(alignTop) obj.position.y -= box2.max.y; // top to y=0
  else obj.position.y -= box2.min.y; // bottom to 0
  return s;
}

const courseGroup = new THREE.Group(); scene.add(courseGroup);
let ballMesh=null, windmillBlades=[], holeIdx=0, strokes=[], pars=[];
const PUTT_MAX=16;

function clearGroup(g){ while(g.children.length) g.remove(g.children[0]); }

function buildHole(i){
  game.loadHole(i);
  clearGroup(courseGroup); windmillBlades=[];
  const G=game.G;
  // 그린 타일
  for(let r=0;r<G.rows;r++)for(let c=0;c<G.cols;c++){ if(!G.cells[r][c]) continue;
    let t=inst('open');
    if(t){ fitModel(t,TILE,true); t.position.x=c*TILE; t.position.z=r*TILE; courseGroup.add(t); }
    else { const m=new THREE.Mesh(new THREE.BoxGeometry(TILE,0.2,TILE),new THREE.MeshStandardMaterial({color:0x6fcf57})); m.position.set(c*TILE,-0.1,r*TILE); m.receiveShadow=true; courseGroup.add(m); }
  }
  // 벽 (그린/비그린 경계, 주황 레일)
  const wallMat=new THREE.MeshStandardMaterial({color:0xe0925a});
  function wall(x,z,w,d){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,0.34,d),wallMat); m.position.set(x,0.17,z); m.castShadow=true; m.receiveShadow=true; courseGroup.add(m); }
  for(let r=0;r<G.rows;r++)for(let c=0;c<G.cols;c++){ if(!G.cells[r][c]) continue;
    if(!game.greenCell(c,r-1)) wall(c*TILE,(r-0.5)*TILE,TILE+0.12,0.16);
    if(!game.greenCell(c,r+1)) wall(c*TILE,(r+0.5)*TILE,TILE+0.12,0.16);
    if(!game.greenCell(c-1,r)) wall((c-0.5)*TILE,r*TILE,0.16,TILE+0.12);
    if(!game.greenCell(c+1,r)) wall((c+0.5)*TILE,r*TILE,0.16,TILE+0.12);
  }
  // 홀 + 깃발
  const hp=G.holePos;
  const holeDisc=new THREE.Mesh(new THREE.CircleGeometry(HOLE_R*0.95,24),new THREE.MeshBasicMaterial({color:0x111111}));
  holeDisc.rotation.x=-Math.PI/2; holeDisc.position.set(hp.x,0.02,hp.z); courseGroup.add(holeDisc);
  let ho=inst('hole_open'); if(ho){ fitModel(ho,TILE,true); ho.position.x=hp.x; ho.position.z=hp.z; courseGroup.add(ho); }
  let fl=inst('flag_red'); if(fl){ fitModel(fl,0.5,false); fl.position.x=hp.x+0.18; fl.position.z=hp.z+0.18; courseGroup.add(fl); }
  // 시작 타일
  let st=inst('start'); if(st){ fitModel(st,TILE,true); st.position.x=G.startPos.x; st.position.z=G.startPos.z; courseGroup.add(st); }
  // 장애물
  for(const o of G.obstacles){ let name = o.kind==='block'?'block':(o.kind==='diamond'?'obstacle_diamond':'castle'); let ob=inst(name);
    if(ob){ fitModel(ob,o.r*2,false); ob.position.x=o.x; ob.position.z=o.z; courseGroup.add(ob); }
    else { const m=new THREE.Mesh(new THREE.BoxGeometry(o.r*1.6,0.5,o.r*1.6),new THREE.MeshStandardMaterial({color:0xcf7a3a})); m.position.set(o.x,0.25,o.z); m.castShadow=true; courseGroup.add(m); }
  }
  // 풍차 (정적 타워 + 회전 날개 크로스)
  for(const w of G.windmills){ let tw=inst('windmill'); if(tw){ fitModel(tw,1.0,false); tw.position.x=w.x; tw.position.z=w.z; courseGroup.add(tw); }
    const blades=new THREE.Group(); const bm=new THREE.MeshStandardMaterial({color:0xe8e2d0});
    for(let k=0;k<2;k++){ const bar=new THREE.Mesh(new THREE.BoxGeometry(w.L*2,0.1,0.14),bm); bar.rotation.y=k*Math.PI/2; bar.castShadow=true; blades.add(bar); }
    blades.position.set(w.x,0.5,w.z); courseGroup.add(blades); windmillBlades.push({grp:blades,w});
  }
  // 공
  if(!ballMesh){ ballMesh=inst('ball_red'); if(ballMesh){ fitModel(ballMesh,BR*2,false); } else { ballMesh=new THREE.Mesh(new THREE.SphereGeometry(BR,20,16),new THREE.MeshStandardMaterial({color:0xffffff})); ballMesh.castShadow=true; } scene.add(ballMesh); }
  placeBall();
  frameCamera();
  document.getElementById('hh').textContent=i+1; document.getElementById('ht').textContent=HOLES.length; document.getElementById('hpar').textContent=HOLES[i].par; document.getElementById('hstroke').textContent=0;
}
function placeBall(){ const b=game.G.ball; ballMesh.position.set(b.x, BR, b.z); }

let camTarget=new THREE.Vector3();
function frameCamera(){
  const G=game.G; let minC=1e9,maxC=-1e9,minR=1e9,maxR=-1e9;
  for(let r=0;r<G.rows;r++)for(let c=0;c<G.cols;c++) if(G.cells[r][c]){ minC=Math.min(minC,c);maxC=Math.max(maxC,c);minR=Math.min(minR,r);maxR=Math.max(maxR,r); }
  const cx=(minC+maxC)/2*TILE, cz=(minR+maxR)/2*TILE; const w=(maxC-minC+2)*TILE, h=(maxR-minR+2)*TILE; const sz=Math.max(w,h);
  camTarget.set(cx,0,cz);
  camera.position.set(cx, sz*1.05, cz + sz*0.95);
  camera.lookAt(camTarget);
}

// ===== 입력: 드래그 퍼팅 =====
const ray=new THREE.Raycaster(); const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0); const gpt=new THREE.Vector3();
let aiming=false, aimStart=null, curPower=0, curDir={x:0,z:0};
const aimArrow = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.02,1), new THREE.MeshBasicMaterial({color:0xffffff})); aimArrow.visible=false; scene.add(aimArrow);
function ndc(e){ const r=canvas.getBoundingClientRect(); const x=((e.clientX-r.left)/r.width)*2-1, y=-((e.clientY-r.top)/r.height)*2+1; return {x,y}; }
function groundAt(e){ const p=ndc(e); ray.setFromCamera(p,camera); if(ray.ray.intersectPlane(groundPlane,gpt)) return {x:gpt.x,z:gpt.z}; return null; }
function down(e){ if(state!=='play'||game.G.ball.moving||game.G.sunk) return; const g=groundAt(e); if(!g)return; aiming=true; aimStart=g; document.getElementById('pwwrap').style.display='block'; }
function move(e){ if(!aiming) return; const g=groundAt(e); if(!g)return; const b=game.G.ball; let dx=b.x-g.x, dz=b.z-g.z; const d=Math.hypot(dx,dz)||1e-4; let power=Math.min(PUTT_MAX, d*3.2); curPower=power; curDir={x:dx/d,z:dz/d};
  document.getElementById('pwbar').style.width=(power/PUTT_MAX*100)+'%';
  aimArrow.visible=true; const len=power*0.18; aimArrow.scale.z=len; aimArrow.position.set(b.x+curDir.x*len/2, BR, b.z+curDir.z*len/2); aimArrow.rotation.y=Math.atan2(curDir.x,curDir.z);
  const t=power/PUTT_MAX; aimArrow.material.color.setRGB(1, 1-t*0.7, 0.3*(1-t)); }
function up(e){ if(!aiming) return; aiming=false; aimArrow.visible=false; document.getElementById('pwwrap').style.display='none';
  if(curPower>0.6){ game.putt(curDir.x*curPower, curDir.z*curPower); document.getElementById('hstroke').textContent=game.G.strokes; } curPower=0; }
canvas.addEventListener('pointerdown',down); addEventListener('pointermove',move); addEventListener('pointerup',up);

// ===== 상태/진행 =====
let state='menu', sinkTimer=0;
function showMsg(t,ms){ const m=document.getElementById('msg'); m.textContent=t; m.style.opacity=1; setTimeout(()=>m.style.opacity=0, ms||1400); }
function startRound(){ holeIdx=0; strokes=[]; pars=HOLES.map(h=>h.par); buildHole(0); state='play'; document.getElementById('menu').classList.add('hidden'); document.getElementById('result').classList.add('hidden'); updateTotal(); }
function updateTotal(){ const done=strokes.reduce((a,b)=>a+b,0); const parDone=pars.slice(0,strokes.length).reduce((a,b)=>a+b,0); const diff=done-parDone; const el=document.getElementById('htotal'); el.textContent = strokes.length? (diff===0?'E':(diff>0?'+'+diff:diff)) : 'E'; }
function holeComplete(){ const s=game.G.strokes; strokes[holeIdx]=s; const par=HOLES[holeIdx].par; const d=s-par;
  const term = s===1?'홀인원!':(d<=-2?'이글!':(d===-1?'버디!':(d===0?'파':(d===1?'보기':'+'+d))));
  showMsg('⛳ '+term+' ('+s+'타)',1500); updateTotal();
  state='between'; sinkTimer=1.6;
}
function nextHole(){ holeIdx++; if(holeIdx>=HOLES.length){ showResult(); } else { buildHole(holeIdx); state='play'; } }
function showResult(){ state='done'; const tbl=document.getElementById('score-tbl'); let total=0,partot=0; let rows='<tr><td>홀</td><td>파</td><td>타수</td></tr>';
  for(let i=0;i<HOLES.length;i++){ total+=strokes[i]; partot+=HOLES[i].par; rows+='<tr><td>'+(i+1)+'</td><td>'+HOLES[i].par+'</td><td><b style="color:#ffe14d">'+strokes[i]+'</b></td></tr>'; }
  tbl.innerHTML=rows; const diff=total-partot; document.getElementById('resTotal').textContent='합계 '+total+'타 ('+(diff===0?'EVEN':(diff>0?'+'+diff:diff))+')';
  let best=JSON.parse(localStorage.getItem('minigolf_best')||'null'); if(best===null||total<best){ best=total; localStorage.setItem('minigolf_best',JSON.stringify(best)); }
  document.getElementById('result').classList.remove('hidden');
}

document.getElementById('playBtn').addEventListener('click',startRound);
document.getElementById('resBtn').addEventListener('click',startRound);

let last=0;
function loop(t){ const dt=Math.min(0.04,last?(t-last)/1000:0); last=t;
  if(state==='play'){ game.update(dt); placeBall(); if(game.G.sunk) holeComplete(); }
  else if(state==='between'){ game.update(dt); sinkTimer-=dt; if(sinkTimer<=0) nextHole(); }
  for(const wb of windmillBlades) wb.grp.rotation.y = wb.w.ang;
  // 카메라 살짝 공 따라가기
  if(ballMesh && (state==='play'||state==='between')){ const desired=camTarget.clone().lerp(new THREE.Vector3(ballMesh.position.x,0,ballMesh.position.z),0.25); }
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

(async ()=>{
  await loadAll();
  document.getElementById('loading').style.display='none';
  const best=JSON.parse(localStorage.getItem('minigolf_best')||'null');
  document.getElementById('bestTotal').textContent = best===null?'-':best+'타';
  document.getElementById('menu').classList.remove('hidden');
  requestAnimationFrame(loop);
})();
</script>
