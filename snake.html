<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>네온 스네이크</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #0a0a14;
    color: #e8f6ff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  #hud {
    display: flex;
    gap: 24px;
    margin-bottom: 10px;
    font-size: 14px;
    letter-spacing: 1px;
  }
  #hud span { color: #4af0c8; }
  #hud b { color: #fff; font-weight: 700; }
  #wrap {
    position: relative;
    box-shadow: 0 0 40px rgba(74,240,200,0.15), inset 0 0 0 2px rgba(74,240,200,0.25);
    border-radius: 8px;
    overflow: hidden;
  }
  canvas { display: block; background: #06060d; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(6,6,13,0.85);
    text-align: center; gap: 14px;
    backdrop-filter: blur(2px);
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: 28px; color: #4af0c8;
    text-shadow: 0 0 12px rgba(74,240,200,0.6);
  }
  #overlay p { font-size: 14px; color: #9fb3c8; line-height: 1.6; }
  #playBtn {
    margin-top: 6px; padding: 12px 32px;
    background: #4af0c8; color: #06060d;
    border: none; border-radius: 999px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    box-shadow: 0 0 20px rgba(74,240,200,0.5);
  }
  #playBtn:active { transform: scale(0.96); }
  #hint { margin-top: 12px; font-size: 12px; color: #5a6b7d; }
</style>
</head>
<body>
  <div id="hud">
    <div>SCORE <b id="score">0</b></div>
    <div>BEST <b id="best">0</b></div>
  </div>
  <div id="wrap">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h1>네온 스네이크</h1>
      <p>먹이를 먹어 몸을 늘리세요.<br>벽이나 자기 몸에 부딪히면 끝!</p>
      <button id="playBtn">▶ 시작</button>
    </div>
  </div>
  <div id="hint">방향키 / WASD · 모바일은 스와이프</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const playBtn = document.getElementById('playBtn');

  const GRID = 20;            // 칸 개수 (20x20)
  let cell = 18;              // 칸 픽셀 크기 (반응형으로 재계산)
  let snake, dir, nextDir, food, score, best, alive, moveTimer, speed, particles, shake;

  best = parseInt(localStorage.getItem('snake_best') || '0', 10);
  bestEl.textContent = best;

  // ---- 반응형 캔버스 크기 ----
  function resize() {
    const maxW = Math.min(window.innerWidth - 24, 460);
    const maxH = window.innerHeight - 140;
    const size = Math.min(maxW, maxH, 460);
    cell = Math.floor(size / GRID);
    canvas.width = cell * GRID;
    canvas.height = cell * GRID;
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- 효과음 (WebAudio, 파일 없이 코드로 생성) ----
  let actx;
  function beep(freq, dur, type='square', vol=0.06) {
    try {
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(actx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
      o.stop(actx.currentTime + dur);
    } catch(e) {}
  }

  function spawnFood() {
    while (true) {
      const f = { x: (Math.random()*GRID)|0, y: (Math.random()*GRID)|0 };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
    }
  }

  function reset() {
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    score = 0; alive = true; speed = 140; moveTimer = 0;
    particles = []; shake = 0;
    spawnFood();
    scoreEl.textContent = 0;
  }

  function addParticles(px, py, color) {
    for (let i=0;i<12;i++){
      particles.push({
        x: px, y: py,
        vx: (Math.random()-0.5)*4, vy:(Math.random()-0.5)*4,
        life: 1, color
      });
    }
  }

  function die() {
    alive = false;
    shake = 12;
    beep(110, 0.4, 'sawtooth', 0.08);
    if (score > best) { best = score; localStorage.setItem('snake_best', best); bestEl.textContent = best; }
    setTimeout(() => {
      overlay.classList.remove('hidden');
      overlay.querySelector('h1').textContent = '게임 오버';
      overlay.querySelector('p').innerHTML = `점수 <b style="color:#fff">${score}</b><br>최고기록 ${best}`;
      playBtn.textContent = '↻ 다시하기';
    }, 600);
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    // 벽 충돌
    if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID) return die();
    // 자기 몸 충돌
    if (snake.some(s => s.x === head.x && s.y === head.y)) return die();

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      beep(660 + score*8, 0.08, 'square', 0.07);
      addParticles((food.x+0.5)*cell, (food.y+0.5)*cell, '#ffd24a');
      if (speed > 70) speed -= 3;   // 점점 빨라짐
      spawnFood();
    } else {
      snake.pop();
    }
  }

  // ---- 렌더 ----
  let last = 0;
  function loop(t) {
    const dt = t - last; last = t;
    if (alive) {
      moveTimer += dt;
      if (moveTimer >= speed) { moveTimer = 0; step(); }
    }
    draw();
    requestAnimationFrame(loop);
  }

  function draw() {
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
      shake *= 0.85; if (shake < 0.5) shake = 0;
    }
    // 배경 + 격자
    ctx.fillStyle = '#06060d';
    ctx.fillRect(-20,-20,canvas.width+40,canvas.height+40);
    ctx.strokeStyle = 'rgba(74,240,200,0.05)';
    ctx.lineWidth = 1;
    for (let i=0;i<=GRID;i++){
      ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*cell); ctx.lineTo(canvas.width,i*cell); ctx.stroke();
    }
    // 먹이 (글로우)
    const fx = (food.x+0.5)*cell, fy=(food.y+0.5)*cell;
    ctx.shadowColor = '#ffd24a'; ctx.shadowBlur = 16;
    ctx.fillStyle = '#ffd24a';
    ctx.beginPath(); ctx.arc(fx, fy, cell*0.32, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // 뱀 (무지개 그라데이션)
    snake.forEach((s, i) => {
      const hue = (i*12 + score*10) % 360;
      ctx.fillStyle = `hsl(${hue}, 90%, 60%)`;
      ctx.shadowColor = `hsl(${hue}, 90%, 60%)`;
      ctx.shadowBlur = i === 0 ? 14 : 6;
      const pad = i === 0 ? 1 : 2;
      roundRect(s.x*cell+pad, s.y*cell+pad, cell-pad*2, cell-pad*2, 4);
      ctx.fill();
    });
    ctx.shadowBlur = 0;
    // 파티클
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.life -= 0.04;
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1;
    particles = particles.filter(p => p.life > 0);
    ctx.restore();
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  // ---- 입력: 키보드 ----
  function turn(nx, ny) {
    // 정반대 방향 전환 금지
    if (nx === -dir.x && ny === -dir.y) return;
    nextDir = { x: nx, y: ny };
  }
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k==='arrowup'||k==='w') turn(0,-1);
    else if (k==='arrowdown'||k==='s') turn(0,1);
    else if (k==='arrowleft'||k==='a') turn(-1,0);
    else if (k==='arrowright'||k==='d') turn(1,0);
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
  });

  // ---- 입력: 모바일 스와이프 ----
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, {passive:true});
  canvas.addEventListener('touchmove', e => {
    if (!touchStart) return;
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) turn(dx>0?1:-1, 0);
    else turn(0, dy>0?1:-1);
    touchStart = null;
  }, {passive:true});

  // ---- 시작 ----
  function start() {
    reset();
    overlay.classList.add('hidden');
    if (actx && actx.state === 'suspended') actx.resume();
  }
  playBtn.addEventListener('click', start);

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
