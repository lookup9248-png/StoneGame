<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>던전로그 — Dungeon Log</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#0d0a12;color:#e8e0d0;overflow:hidden;
    font-family:"Trebuchet MS","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;user-select:none;}
  #wrap{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;}
  #top{display:flex;gap:6px;align-items:center;padding:6px 8px;flex-wrap:wrap;background:#16121f;border-bottom:1px solid #2a2236;z-index:5;}
  .stat{background:#221a2e;border:1px solid #36283f;border-radius:8px;padding:4px 9px;font-size:13px;font-weight:700;white-space:nowrap;}
  .stat b{color:#ffd24a;}
  #hpwrap{flex:1;min-width:90px;max-width:220px;height:16px;background:#2a1620;border-radius:8px;overflow:hidden;border:1px solid #5a2030;position:relative;}
  #hpbar{height:100%;background:linear-gradient(90deg,#e0445a,#ff7a5a);transition:width .15s;}
  #hptxt{position:absolute;inset:0;text-align:center;font-size:11px;font-weight:800;line-height:16px;text-shadow:0 1px 2px #000;}
  #cv{flex:1;display:block;background:#0d0a12;image-rendering:pixelated;touch-action:none;}
  #log{position:absolute;left:8px;bottom:8px;width:min(60vw,360px);font-size:12px;line-height:1.5;
    color:#cbb;text-shadow:0 1px 2px #000;pointer-events:none;z-index:4;}
  #log div{opacity:.85;}
  #log div:last-child{color:#fff;opacity:1;}
  /* 모바일 컨트롤 */
  #pad{position:absolute;right:14px;bottom:14px;z-index:6;display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,46px);gap:5px;}
  .pad-btn{background:rgba(50,40,66,.85);border:1px solid #4a3a56;border-radius:10px;color:#ffd24a;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .pad-btn:active{background:rgba(90,70,110,.95);}
  .pad-empty{visibility:hidden;}
  #actions{position:absolute;left:14px;bottom:64px;z-index:6;display:flex;flex-direction:column;gap:6px;}
  .act{background:rgba(50,40,66,.85);border:1px solid #4a3a56;border-radius:10px;color:#e8e0d0;font-size:12px;font-weight:700;padding:8px 10px;min-width:64px;text-align:center;}
  .act:active{background:rgba(90,70,110,.95);}
  .act b{color:#7be08a;}
  /* 패널 */
  .panel{position:absolute;inset:0;z-index:12;display:flex;align-items:center;justify-content:center;background:rgba(8,6,12,.85);backdrop-filter:blur(3px);padding:22px;}
  .panel.hidden{display:none;}
  .card{background:linear-gradient(180deg,#241b32,#170f22);border:1px solid #3a2c48;border-radius:16px;padding:24px 26px;max-width:380px;width:100%;text-align:center;box-shadow:0 16px 44px rgba(0,0,0,.6);}
  .card h1{font-size:28px;color:#ffd24a;margin-bottom:8px;letter-spacing:1px;}
  .card h2{font-size:19px;color:#ff8a7a;margin:8px 0;}
  .card p{font-size:13.5px;color:#cbbcd6;line-height:1.75;}
  .card .key{display:inline-block;background:#33263f;border:1px solid #4a3a56;border-radius:5px;padding:1px 7px;font-weight:700;color:#ffd24a;font-size:12px;margin:1px;}
  .btn{margin-top:16px;padding:12px 34px;background:linear-gradient(180deg,#ffd24a,#e8a020);color:#3a2400;border:none;border-radius:11px;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #9a6a10;}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #9a6a10;}
  #loading{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;color:#a98;font-weight:800;font-size:17px;}
</style>
</head>
<body>
<div id="wrap">
  <div id="top">
    <span class="stat">B<b id="sDepth">1</b></span>
    <div id="hpwrap"><div id="hpbar"></div><div id="hptxt"></div></div>
    <span class="stat">Lv<b id="sLvl">1</b></span>
    <span class="stat">⚔<b id="sAtk">4</b></span>
    <span class="stat">🛡<b id="sDef">0</b></span>
    <span class="stat">🪙<b id="sGold">0</b></span>
    <span class="stat">🧪<b id="sPot">1</b></span>
  </div>
  <canvas id="cv"></canvas>
  <div id="log"></div>
  <div id="actions">
    <div class="act" id="aPot">🧪 물약 <b id="aPotN">1</b></div>
    <div class="act" id="aWait">⏳ 대기</div>
    <div class="act" id="aDesc">▼ 계단</div>
  </div>
  <div id="pad">
    <div class="pad-btn pad-empty"></div><div class="pad-btn" data-dir="up">▲</div><div class="pad-btn pad-empty"></div>
    <div class="pad-btn" data-dir="left">◀</div><div class="pad-btn pad-empty"></div><div class="pad-btn" data-dir="right">▶</div>
    <div class="pad-btn pad-empty"></div><div class="pad-btn" data-dir="down">▼</div><div class="pad-btn pad-empty"></div>
  </div>
</div>

<div id="loading">던전 생성 중…</div>

<div id="menu" class="panel hidden">
  <div class="card">
    <h1>🗡 던전로그</h1>
    <p>턴제 로그라이크. 한 칸 움직일 때마다 몬스터도 한 턴 움직입니다.<br><br>
    적에게 <b>이동해 부딪치면 공격</b>! 무기·방어구·물약을 모으고,
    <b>계단(▼)</b>을 찾아 더 깊은 층으로 내려가세요.<br>
    깊을수록 강한 적과 좋은 전리품이 기다립니다. 죽으면 끝!</p>
    <p style="margin-top:10px;font-size:12px;">
      <span class="key">방향키/WASD</span> 이동·공격 ·
      <span class="key">Q</span> 물약 ·
      <span class="key">Space</span> 대기 ·
      <span class="key">&gt;/Enter</span> 계단</p>
    <div style="margin-top:8px;font-size:12px;color:#bca;">최고 기록 지하 <b id="bestDepth" style="color:#ffd24a;">-</b>층</div>
    <button class="btn" id="startBtn">던전 입장</button>
  </div>
</div>

<div id="dead" class="panel hidden">
  <div class="card">
    <h1>☠ 사망</h1>
    <h2 id="deadDepth"></h2>
    <div id="deadStat" style="font-size:13px;color:#cbb;line-height:1.8;"></div>
    <button class="btn" id="retryBtn">다시 도전</button>
  </div>
</div>

<script>/* 던전로그 — 로그라이크 코어 (THREE/Canvas 비의존, node 테스트 가능) */
(function(global){
  // ---- 시드 RNG ----
  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

  // ---- 몬스터 정의 (tile 인덱스는 렌더에서만 사용) ----
  const MTYPE = {
    slime:   {name:'슬라임',  hp:6,  atk:3,  def:0, xp:3,  gold:2,  tile:108, minD:1, w:5},
    spider:  {name:'거미',    hp:5,  atk:3,  def:0, xp:3,  gold:1,  tile:121, minD:1, w:4},
    skeleton:{name:'해골',    hp:11, atk:5,  def:1, xp:6,  gold:5,  tile:86,  minD:2, w:4},
    goblin:  {name:'고블린',  hp:9,  atk:4,  def:1, xp:5,  gold:6,  tile:112, minD:2, w:4},
    ghost:   {name:'유령',    hp:8,  atk:5,  def:0, xp:6,  gold:4,  tile:120, minD:3, w:3},
    imp:     {name:'임프',    hp:14, atk:6,  def:1, xp:9,  gold:9,  tile:109, minD:4, w:3},
    demon:   {name:'데몬',    hp:20, atk:8,  def:2, xp:14, gold:16, tile:110, minD:6, w:2},
    ogre:    {name:'오우거',  hp:30, atk:11, def:3, xp:22, gold:25, tile:88,  minD:8, w:1},
  };
  // ---- 아이템 정의 ----
  const WEAPONS = {
    dagger:    {name:'단검',   atk:2,  tile:106},
    sword:     {name:'검',     atk:4,  tile:104},
    mace:      {name:'철퇴',   atk:6,  tile:117},
    axe:       {name:'도끼',   atk:7,  tile:118},
    greatsword:{name:'대검',   atk:9,  tile:107},
  };
  const ARMORS = {
    buckler: {name:'버클러', def:1, tile:102},
    shield:  {name:'방패',   def:2, tile:101},
    plate:   {name:'판금',   def:4, tile:100},
  };

  function makeGame(seed){
    const rng = mulberry32((seed||((Math.random()*1e9)|0))>>>0);
    const ri = (a,b)=> a + Math.floor(rng()*(b-a+1));
    const pick = arr => arr[Math.floor(rng()*arr.length)];

    const S = {
      W:40, H:28, TS:16,
      map:null, seen:null, vis:null,
      player:{ x:0,y:0, hp:26, maxhp:26, atk:4, def:0, lvl:1, xp:0, xpNext:12,
               gold:0, weapon:null, armor:null, potions:1, kills:0, name:'용사' },
      monsters:[], items:[], stairs:{x:0,y:0},
      depth:0, turns:0, state:'play', log:[], best: 0,
    };
    function logMsg(t){ S.log.push(t); if(S.log.length>40) S.log.shift(); }

    const inb=(x,y)=> x>=0&&x<S.W&&y>=0&&y<S.H;
    const isWall=(x,y)=> !inb(x,y) || S.map[y][x]==='wall';
    const monAt=(x,y)=> S.monsters.find(m=>m.x===x&&m.y===y&&m.hp>0);
    const itemAt=(x,y)=> S.items.find(it=>it.x===x&&it.y===y);

    // ---------- 던전 생성 ----------
    function genFloor(depth){
      S.depth=depth;
      S.map=[]; S.seen=[]; S.vis=[];
      for(let y=0;y<S.H;y++){ S.map[y]=[]; S.seen[y]=[]; S.vis[y]=[]; for(let x=0;x<S.W;x++){ S.map[y][x]='wall'; S.seen[y][x]=false; S.vis[y][x]=false; } }
      const rooms=[];
      const tries=ri(8,11);
      for(let i=0;i<tries;i++){
        const w=ri(4,8), h=ri(4,6);
        const x=ri(1,S.W-w-2), y=ri(1,S.H-h-2);
        const r={x,y,w,h,cx:(x+(w>>1)),cy:(y+(h>>1))};
        if(rooms.some(o=> x<=o.x+o.w+1 && x+w+1>=o.x && y<=o.y+o.h+1 && y+h+1>=o.y)) continue;
        for(let yy=y;yy<y+h;yy++)for(let xx=x;xx<x+w;xx++) S.map[yy][xx]='floor';
        rooms.push(r);
      }
      // 복도 연결
      for(let i=1;i<rooms.length;i++){
        let ax=rooms[i-1].cx, ay=rooms[i-1].cy, bx=rooms[i].cx, by=rooms[i].cy;
        if(rng()<0.5){ carveH(ax,bx,ay); carveV(ay,by,bx); } else { carveV(ay,by,ax); carveH(ax,bx,by); }
      }
      S.rooms=rooms;
      // 플레이어 = 첫 방
      S.player.x=rooms[0].cx; S.player.y=rooms[0].cy;
      // 계단 = 마지막 방
      const last=rooms[rooms.length-1]; S.stairs={x:last.cx,y:last.cy};
      // 몬스터/아이템 배치
      S.monsters=[]; S.items=[];
      const types=Object.keys(MTYPE).filter(k=>MTYPE[k].minD<=depth);
      const wpool=[]; for(const k of types){ for(let i=0;i<MTYPE[k].w;i++)wpool.push(k); }
      for(let i=1;i<rooms.length;i++){
        const r=rooms[i];
        const cnt=ri(1,2)+Math.floor(depth/3);
        for(let c=0;c<cnt;c++){
          const mx=ri(r.x,r.x+r.w-1), my=ri(r.y,r.y+r.h-1);
          if((mx===S.stairs.x&&my===S.stairs.y)||monAt(mx,my))continue;
          spawnMonster(pick(wpool),mx,my,depth);
        }
        // 아이템
        if(rng()<0.6){ const ix=ri(r.x,r.x+r.w-1), iy=ri(r.y,r.y+r.h-1); if(!(ix===S.stairs.x&&iy===S.stairs.y)) dropItem(ix,iy,rollItem(depth)); }
      }
      // 보물상자 1~2개
      for(let c=0;c<ri(1,2);c++){ const r=pick(rooms.slice(1)); if(r){ S.items.push({x:r.x,y:r.y,kind:'chest'}); } }
      computeFOV();
      logMsg('지하 '+depth+'층에 들어섰다.');
    }
    function carveH(x1,x2,y){ for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++) if(inb(x,y))S.map[y][x]='floor'; }
    function carveV(y1,y2,x){ for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++) if(inb(x,y))S.map[y][x]='floor'; }

    function spawnMonster(type,x,y,depth){
      const t=MTYPE[type]; const sc=1+(depth-t.minD)*0.12;
      S.monsters.push({ type, name:t.name, x,y, hp:Math.round(t.hp*sc), maxhp:Math.round(t.hp*sc),
        atk:Math.round(t.atk*sc), def:t.def, xp:t.xp, gold:t.gold, tile:t.tile, hit:0 });
    }
    function rollItem(depth){
      const r=rng();
      if(r<0.5) return {kind:'potion', heal: r<0.18?22:11};
      if(r<0.78){ const ks=Object.keys(WEAPONS); return {kind:'weapon', key: ks[Math.min(ks.length-1, Math.floor(rng()*Math.min(ks.length, 2+Math.floor(depth/2))))]}; }
      const ks=Object.keys(ARMORS); return {kind:'armor', key: ks[Math.min(ks.length-1, Math.floor(rng()*Math.min(ks.length,1+Math.floor(depth/3))))]};
    }
    function dropItem(x,y,it){ it.x=x; it.y=y; S.items.push(it); }

    // ---------- 시야(FOV) ----------
    function computeFOV(){
      const R=7, px=S.player.x, py=S.player.y;
      for(let y=0;y<S.H;y++)for(let x=0;x<S.W;x++) S.vis[y][x]=false;
      S.vis[py][px]=true; S.seen[py][px]=true;
      for(let a=0;a<360;a+=4){
        const dx=Math.cos(a*Math.PI/180), dy=Math.sin(a*Math.PI/180);
        let fx=px+0.5, fy=py+0.5;
        for(let i=0;i<R;i++){
          fx+=dx; fy+=dy; const cx=Math.floor(fx), cy=Math.floor(fy);
          if(!inb(cx,cy))break;
          S.vis[cy][cx]=true; S.seen[cy][cx]=true;
          if(S.map[cy][cx]==='wall')break;
        }
      }
    }

    // ---------- 전투 ----------
    function pAtk(){ return S.player.atk + (S.player.weapon?WEAPONS[S.player.weapon].atk:0); }
    function pDef(){ return S.player.def + (S.player.armor?ARMORS[S.player.armor].def:0); }
    function attackMonster(m){
      const dmg=Math.max(1, pAtk()-m.def + ri(-1,2));
      m.hp-=dmg; m.hit=1;
      logMsg('⚔ '+m.name+'에게 '+dmg+' 피해');
      if(m.hp<=0){ killMonster(m); }
    }
    function killMonster(m){
      logMsg('💀 '+m.name+' 처치! (+'+m.xp+' XP, +'+m.gold+' G)');
      S.player.xp+=m.xp; S.player.gold+=m.gold; S.player.kills++;
      while(S.player.xp>=S.player.xpNext){ levelUp(); }
    }
    function levelUp(){
      S.player.xp-=S.player.xpNext; S.player.lvl++; S.player.xpNext=Math.round(S.player.xpNext*1.5);
      S.player.maxhp+=6; S.player.hp=S.player.maxhp; S.player.atk+=1; if(S.player.lvl%3===0)S.player.def+=1;
      logMsg('⭐ 레벨 '+S.player.lvl+'! 체력·공격 상승, 완전 회복.');
    }
    function attackPlayer(m){
      const dmg=Math.max(1, m.atk-pDef() + ri(-1,1));
      S.player.hp-=dmg;
      logMsg('🩸 '+m.name+'에게 '+dmg+' 피해');
      if(S.player.hp<=0){ S.player.hp=0; die(); }
    }
    function die(){ S.state='dead'; S.best=Math.max(S.best,S.depth); logMsg('☠ 쓰러졌다... 지하 '+S.depth+'층까지 도달.'); }

    // ---------- 행동 ----------
    function tryMove(dx,dy){
      if(S.state!=='play') return false;
      const nx=S.player.x+dx, ny=S.player.y+dy;
      const m=monAt(nx,ny);
      if(m){ attackMonster(m); monstersTurn(); afterTurn(); return true; }
      if(isWall(nx,ny)){ return false; }
      S.player.x=nx; S.player.y=ny;
      const it=itemAt(nx,ny); if(it) pickup(it);
      monstersTurn(); afterTurn(); return true;
    }
    function wait(){ if(S.state!=='play')return; monstersTurn(); afterTurn(); }
    function pickup(it){
      const i=S.items.indexOf(it); if(i>=0)S.items.splice(i,1);
      if(it.kind==='potion'){ S.player.potions++; logMsg('🧪 물약 획득 (보유 '+S.player.potions+')'); it._heal=it.heal; }
      else if(it.kind==='weapon'){ equipWeapon(it.key); }
      else if(it.kind==='armor'){ equipArmor(it.key); }
      else if(it.kind==='chest'){ openChest(it); }
    }
    function equipWeapon(key){
      const cur=S.player.weapon;
      if(!cur || WEAPONS[key].atk>WEAPONS[cur].atk){ S.player.weapon=key; logMsg('🗡 '+WEAPONS[key].name+' 장착 (공격 +'+WEAPONS[key].atk+')'); }
      else logMsg(WEAPONS[key].name+'은 기존 무기보다 약하다.');
    }
    function equipArmor(key){
      const cur=S.player.armor;
      if(!cur || ARMORS[key].def>ARMORS[cur].def){ S.player.armor=key; logMsg('🛡 '+ARMORS[key].name+' 장착 (방어 +'+ARMORS[key].def+')'); }
      else logMsg(ARMORS[key].name+'은 기존 방어구보다 약하다.');
    }
    function openChest(it){
      const loot=rollItem(S.depth+1);
      S.player.gold+=ri(5,12)*(1+S.depth);
      logMsg('🎁 보물상자! 금화 획득.');
      if(loot.kind==='potion'){ S.player.potions++; logMsg('🧪 물약도 들어있다.'); }
      else if(loot.kind==='weapon'){ equipWeapon(loot.key); }
      else equipArmor(loot.key);
    }
    function usePotion(){
      if(S.state!=='play')return false;
      if(S.player.potions<=0){ logMsg('물약이 없다.'); return false; }
      S.player.potions--; const heal=Math.round(S.player.maxhp*0.5);
      S.player.hp=Math.min(S.player.maxhp,S.player.hp+heal);
      logMsg('🧪 물약 사용 (+'+heal+' 회복)'); monstersTurn(); afterTurn(); return true;
    }
    function descend(){
      if(S.state!=='play')return false;
      if(S.player.x===S.stairs.x && S.player.y===S.stairs.y){ genFloor(S.depth+1); return true; }
      logMsg('계단(▼) 위에서 내려갈 수 있다.'); return false;
    }

    // ---------- 몬스터 턴 ----------
    function monstersTurn(){
      for(const m of S.monsters){
        if(m.hp<=0)continue; if(m.hit>0)m.hit-=1;
        const dist=Math.abs(m.x-S.player.x)+Math.abs(m.y-S.player.y);
        if(dist===1){ attackPlayer(m); continue; }
        if(dist>9 || !S.vis[m.y][m.x]) continue; // 멀거나 안 보이면 대기
        // 플레이어 향해 한 칸 (탐욕적, 벽/타몬스터 회피)
        const opts=[];
        if(S.player.x>m.x)opts.push([1,0]); else if(S.player.x<m.x)opts.push([-1,0]);
        if(S.player.y>m.y)opts.push([0,1]); else if(S.player.y<m.y)opts.push([0,-1]);
        let moved=false;
        for(const [dx,dy] of opts){
          const nx=m.x+dx, ny=m.y+dy;
          if(!isWall(nx,ny) && !monAt(nx,ny) && !(nx===S.player.x&&ny===S.player.y)){ m.x=nx; m.y=ny; moved=true; break; }
        }
      }
      S.monsters=S.monsters.filter(m=>m.hp>0);
    }
    function afterTurn(){ S.turns++; computeFOV(); }

    function newGame(){
      Object.assign(S.player,{ hp:26,maxhp:26,atk:4,def:0,lvl:1,xp:0,xpNext:12,gold:0,weapon:null,armor:null,potions:1,kills:0 });
      S.state='play'; S.log=[]; S.turns=0;
      genFloor(1);
    }

    return {
      state:S, MTYPE, WEAPONS, ARMORS,

<script>
(function(){
  const TILE_SRC = window.__RLT || {};
  const game = window.RL.makeGame();
  const S = game.state;
  // 타일 인덱스 매핑 (라이브 보정 가능)
  const T = {
    floor:1, floorAlt:[0,2,3], wall:58, wallAlt:[57,59],
    stairs:8, player:96, chestClosed:81, chestOpen:82,
    potion:115, potionBig:129,
  };
  const TS=16, SCALE=2.4, DTS=Math.round(TS*SCALE); // 표시 타일 크기

  const cv=document.getElementById('cv'), ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
  const IMG={}; let loaded=0, total=0;
  function loadTiles(cb){
    const keys=Object.keys(TILE_SRC); total=keys.length;
    if(!total){ cb(); return; }
    keys.forEach(k=>{ const im=new Image(); im.onload=im.onerror=()=>{ loaded++; if(loaded>=total)cb(); }; im.src=TILE_SRC[k]; IMG[k]=im; });
  }
  function tile(idx){ return IMG[idx]; }

  let cw=0,ch=0;
  function resize(){ cw=cv.clientWidth; ch=cv.clientHeight; cv.width=cw; cv.height=ch; ctx.imageSmoothingEnabled=false; }
  addEventListener('resize',resize);

  function hashCell(x,y){ let h=(x*73856093)^(y*19349663); h=(h<0?-h:h); return h; }
  function floorTile(x,y){ const h=hashCell(x,y)%11; return h===0?T.floorAlt[0]:(h===3?T.floorAlt[1]:(h===7?T.floorAlt[2]:T.floor)); }
  function wallTile(x,y){ const h=hashCell(x,y)%7; return h===0?T.wallAlt[0]:(h===4?T.wallAlt[1]:T.wall); }

  function draw(){
    ctx.fillStyle='#0a0810'; ctx.fillRect(0,0,cw,ch);
    if(!S.map){ return; }
    const camX=S.player.x*DTS - cw/2 + DTS/2;
    const camY=S.player.y*DTS - ch/2 + DTS/2;
    const x0=Math.max(0,Math.floor(camX/DTS)-1), x1=Math.min(S.W-1,Math.floor((camX+cw)/DTS)+1);
    const y0=Math.max(0,Math.floor(camY/DTS)-1), y1=Math.min(S.H-1,Math.floor((camY+ch)/DTS)+1);
    for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
      if(!S.seen[y][x]) continue;
      const sx=Math.round(x*DTS-camX), sy=Math.round(y*DTS-camY);
      const isW=S.map[y][x]==='wall';
      const im=tile(isW?wallTile(x,y):floorTile(x,y));
      if(im&&im.complete) ctx.drawImage(im,sx,sy,DTS,DTS);
      else { ctx.fillStyle=isW?'#2a2236':'#171022'; ctx.fillRect(sx,sy,DTS,DTS); }
      if(!S.vis[y][x]){ ctx.fillStyle='rgba(6,4,12,0.58)'; ctx.fillRect(sx,sy,DTS,DTS); }
    }
    // 계단
    drawAt(T.stairs, S.stairs.x, S.stairs.y, camX, camY, true);
    // 아이템
    for(const it of S.items){ if(!S.seen[it.y][it.x])continue; if(!S.vis[it.y][it.x])continue;
      let idx=T.chestClosed;
      if(it.kind==='potion')idx=it.heal>=18?T.potionBig:T.potion;
      else if(it.kind==='weapon')idx=window.RL.WEAPONS[it.key].tile;
      else if(it.kind==='armor')idx=window.RL.ARMORS[it.key].tile;
      else if(it.kind==='chest')idx=T.chestClosed;
      drawAt(idx,it.x,it.y,camX,camY);
    }
    // 몬스터
    for(const m of S.monsters){ if(!S.vis[m.y][m.x])continue;
      const sx=Math.round(m.x*DTS-camX), sy=Math.round(m.y*DTS-camY);
      const im=tile(m.tile);
      if(m.hit>0){ ctx.save(); ctx.globalAlpha=0.9; }
      if(im&&im.complete) ctx.drawImage(im,sx,sy,DTS,DTS);
      if(m.hit>0){ ctx.fillStyle='rgba(255,80,80,0.45)'; ctx.fillRect(sx,sy,DTS,DTS); ctx.restore(); }
      // hp 바
      if(m.hp<m.maxhp){ const bw=DTS-6; ctx.fillStyle='#400'; ctx.fillRect(sx+3,sy-3,bw,3); ctx.fillStyle='#e0445a'; ctx.fillRect(sx+3,sy-3,bw*Math.max(0,m.hp/m.maxhp),3); }
    }
    // 플레이어
    drawAt(T.player, S.player.x, S.player.y, camX, camY);
  }
  function drawAt(idx,gx,gy,camX,camY,dim){
    const sx=Math.round(gx*DTS-camX), sy=Math.round(gy*DTS-camY);
    const im=tile(idx); if(im&&im.complete) ctx.drawImage(im,sx,sy,DTS,DTS);
  }

  function refreshHUD(){
    document.getElementById('sDepth').textContent=S.depth;
    document.getElementById('sLvl').textContent=S.player.lvl;
    document.getElementById('sAtk').textContent=game.pAtk();
    document.getElementById('sDef').textContent=game.pDef();
    document.getElementById('sGold').textContent=S.player.gold;
    document.getElementById('sPot').textContent=S.player.potions;
    document.getElementById('aPotN').textContent=S.player.potions;
    document.getElementById('hpbar').style.width=(S.player.hp/S.player.maxhp*100)+'%';
    document.getElementById('hptxt').textContent=S.player.hp+' / '+S.player.maxhp;
    const lg=document.getElementById('log'); lg.innerHTML=S.log.slice(-5).map(t=>'<div>'+t+'</div>').join('');
  }
  function frame(){ draw(); requestAnimationFrame(frame); }

  // ---- 입력 ----
  function act(fn){ if(S.state!=='play')return; fn(); refreshHUD(); if(S.state==='dead') showDead(); }
  function move(dx,dy){ act(()=>game.tryMove(dx,dy)); }
  addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    if(['arrowup','w'].includes(k)){ move(0,-1); e.preventDefault(); }
    else if(['arrowdown','s'].includes(k)){ move(0,1); e.preventDefault(); }
    else if(['arrowleft','a'].includes(k)){ move(-1,0); e.preventDefault(); }
    else if(['arrowright','d'].includes(k)){ move(1,0); e.preventDefault(); }
    else if(k==='q'){ act(()=>game.usePotion()); }
    else if(k===' '){ act(()=>game.wait()); e.preventDefault(); }
    else if(k==='>'||k==='enter'||k==='.'){ act(()=>game.descend()); }
  });
  document.querySelectorAll('#pad .pad-btn[data-dir]').forEach(b=>{
    b.addEventListener('click',()=>{ const d=b.dataset.dir; move(d==='left'?-1:d==='right'?1:0, d==='up'?-1:d==='down'?1:0); });
  });
  document.getElementById('aPot').addEventListener('click',()=>act(()=>game.usePotion()));
  document.getElementById('aWait').addEventListener('click',()=>act(()=>game.wait()));
  document.getElementById('aDesc').addEventListener('click',()=>act(()=>game.descend()));

  // ---- 패널 ----
  function showDead(){
    document.getElementById('deadDepth').textContent='지하 '+S.depth+'층까지 도달';
    document.getElementById('deadStat').innerHTML='레벨 '+S.player.lvl+' · 처치 '+S.player.kills+' · 금화 '+S.player.gold;
    try{ const b=Math.max(S.depth, parseInt(localStorage.getItem('dl_best')||'0',10)); localStorage.setItem('dl_best',b); }catch(e){}
    document.getElementById('dead').classList.remove('hidden');
  }
  function start(){
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('dead').classList.add('hidden');
    game.newGame(); resize(); refreshHUD();
  }
  document.getElementById('startBtn').addEventListener('click',start);
  document.getElementById('retryBtn').addEventListener('click',start);

  loadTiles(()=>{
    document.getElementById('loading').style.display='none';
    let best='-'; try{ best=localStorage.getItem('dl_best')||'-'; }catch(e){}
    document.getElementById('bestDepth').textContent=best;
    document.getElementById('menu').classList.remove('hidden');
    resize(); requestAnimationFrame(frame);
    // 테스트 훅
    window.__dl={ game, S, move:(dx,dy)=>{game.tryMove(dx,dy);refreshHUD();}, descend:()=>{game.descend();refreshHUD();},
      potion:()=>{game.usePotion();refreshHUD();}, state:()=>({depth:S.depth,hp:S.player.hp,lvl:S.player.lvl,monsters:S.monsters.length,state:S.state,seen:S.seen.flat().filter(Boolean).length}) };
  });
})();
</script>
</body>
</html>
