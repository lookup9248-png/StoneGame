<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>점프 트레일 — Jump Trail</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#1f2540; color:#fff; overflow:hidden;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; user-select:none; }
  #wrap { position:relative; box-shadow:0 0 50px rgba(90,140,230,0.3), inset 0 0 0 3px rgba(150,190,255,0.3); border-radius:10px; overflow:hidden; }
  canvas { display:block; background:#8ec7ff; image-rendering:pixelated; image-rendering:crisp-edges; touch-action:none; }
  .panel { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(20,28,55,0.82); backdrop-filter:blur(3px); text-align:center; gap:14px; padding:24px; }
  .panel.hidden { display:none; }
  .panel h1 { font-size:32px; color:#ffe14d; text-shadow:0 3px 0 #b3791a, 0 0 18px rgba(255,210,60,0.4); letter-spacing:1px; }
  .panel h2 { font-size:24px; color:#9ef07a; }
  .panel p { font-size:13px; color:#c7d4ee; line-height:1.7; max-width:340px; }
  .btn { padding:13px 36px; background:linear-gradient(180deg,#7ad65b,#3fa83a); color:#0e2c0a; border:2px solid #225c1c;
    border-radius:10px; font-size:18px; font-weight:900; cursor:pointer; box-shadow:0 6px 0 #225c1c; letter-spacing:1px; }
  .btn:active { transform:translateY(4px); box-shadow:0 2px 0 #225c1c; }
  #stat { display:flex; gap:20px; font-size:13px; color:#c7d4ee; }
  #stat b { color:#ffe14d; }
  #hint { margin-top:8px; font-size:11px; color:#8a98bb; line-height:1.7; }
  #loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#1f2540; color:#ffe14d; font-weight:800; }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="720" height="480"></canvas>
    <div id="loading">로딩 중…</div>

    <div id="menu" class="panel hidden">
      <h1>🏃 점프 트레일</h1>
      <p>달리고 점프해서 깃발까지!<br>적은 <b style="color:#9ef07a">위에서 밟아</b> 처치하고, <b style="color:#ffd23a">코인·보석</b>을 모으세요.<br>가시와 용암은 피하고요!</p>
      <div id="stat"><span>최고 점수 <b id="bestScore">0</b></span></div>
      <button id="playBtn" class="btn">▶ 시작</button>
      <div id="hint">PC: ← → 이동 · ↑/Space/W 점프 · ↓ 숙이기<br>모바일: 화면 버튼</div>
    </div>

    <div id="over" class="panel hidden">
      <h1 id="overTitle">게임 오버</h1>
      <p id="overMsg"></p>
      <button id="overBtn" class="btn">↻ 다시</button>
    </div>
  </div>

<script>
(() => {
  const A = window.__ASSETS || { img:{}, snd:{} };
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = canvas.width, H = canvas.height;

  const loadingEl=document.getElementById('loading'), menu=document.getElementById('menu'), playBtn=document.getElementById('playBtn');
  const over=document.getElementById('over'), overTitle=document.getElementById('overTitle'), overMsg=document.getElementById('overMsg'), overBtn=document.getElementById('overBtn');
  const bestScoreEl=document.getElementById('bestScore');

  function fit(){ const mw=Math.min(window.innerWidth-16,W), mh=window.innerHeight-20; const s=Math.min(mw/W,mh/H,1); canvas.style.width=Math.round(W*s)+'px'; canvas.style.height=Math.round(H*s)+'px'; }
  window.addEventListener('resize',fit); fit();

  const IMG={}; let imgTotal=0,imgDone=0;
  for(const k in A.img){ imgTotal++; const im=new Image(); im.onload=im.onerror=()=>imgDone++; im.src=A.img[k]; IMG[k]=im; }
  const SND={}; for(const k in A.snd){ try{ const a=new Audio(); a.src=A.snd[k]; SND[k]=a; }catch(e){} }
  function playSnd(n,v=0.5,r=1){ const b=SND[n]; if(!b)return; try{ const a=b.cloneNode(); a.volume=v; a.playbackRate=r; a.play().catch(()=>{});}catch(e){} }

  let best=JSON.parse(localStorage.getItem('jumptrail_best')||'{"score":0}');
  bestScoreEl.textContent=(best.score||0).toLocaleString();

  const TILE=48;
  // 레벨 맵 (# 땅, c 상자, = 원웨이판, ^ 가시, ~ 용암, o 코인, g 보석, h 하트, F 깃발, a 무당벌레, b 벌, r 개구리, @ 시작)
  const LEVELS=[
[
"                                                                            ",
"                                                                            ",
"                  o o o                              g                      ",
"                 ======                       o o o                         ",
"        o                              b                                    ",
"       o o            ^^      o o o            ====        o  o   o          ",
"   @          c     #####  =======                      ========       F    ",
"#######   a   ###   #####         r        a        ^^^         a    #######  ",
"#######gg#########################################################  #########",
"#######  ######################  ###############  ###############  ##########",
],
[
"                                                                                  ",
"            o o                            g g g                                   ",
"           =====            b       b      =====                b                  ",
"     o o                                              o o o                        ",
"    =====        ^^^^^      ====              c c          ========       o o      ",
"          o o                       o o                                  ====== F  ",
"  @       ====   c c   a    ====           a        ~~~~~~        a       ##### #  ",
"########       ##########       #######          ##########            ###########",
"##########  h  #########################  ###  ##########################  #######",
"########################  ~~~~~~  ##############################  ################ ",
],
  ];

  let state='menu', lvl, grid, cols, rows, levelW, levelH, started;
  let player, enemies, coins, gems, hearts, flag, cam, score, hearts_n, time, levelIdx, flagAnim;
  cam={x:0,y:0};
  const keys={}; let btn={left:false,right:false,jump:false,down:false};

  function parseLevel(idx){
    const map=LEVELS[idx]; rows=map.length; cols=Math.max(...map.map(r=>r.length));
    grid=[]; enemies=[]; coins=[]; gems=[]; hearts=[]; flag=null; let start={x:80,y:80};
    for(let y=0;y<rows;y++){ const row=[]; const line=map[y];
      for(let x=0;x<cols;x++){ const ch=line[x]||' '; let g=' ';
        if(ch==='#'||ch==='c'||ch==='='||ch==='^'||ch==='~') g=ch;
        else if(ch==='o') coins.push({x:x*TILE+TILE/2,y:y*TILE+TILE/2,t:Math.random()*6,dead:false});
        else if(ch==='g') gems.push({x:x*TILE+TILE/2,y:y*TILE+TILE/2,t:Math.random()*6,dead:false});
        else if(ch==='h') hearts.push({x:x*TILE+TILE/2,y:y*TILE+TILE/2,t:0,dead:false});
        else if(ch==='F') flag={x:x*TILE,y:y*TILE};
        else if(ch==='a') enemies.push(mkEnemy('lady',x*TILE+TILE/2,y*TILE+TILE-20));
        else if(ch==='b') enemies.push(mkEnemy('bee',x*TILE+TILE/2,y*TILE+TILE/2));
        else if(ch==='r') enemies.push(mkEnemy('frog',x*TILE+TILE/2,y*TILE+TILE-18));
        else if(ch==='@') start={x:x*TILE+TILE/2,y:y*TILE+TILE/2};
        row.push(g);
      }
      grid.push(row);
    }
    levelW=cols*TILE; levelH=rows*TILE;
    player={ x:start.x, y:start.y, w:30, h:42, vx:0, vy:0, onGround:false, face:1, anim:0, coyote:0, jbuf:0, iframe:0, duck:false, dropT:0 };
    cam={x:0,y:0}; flagAnim=0;
  }
  function mkEnemy(type,x,y){
    if(type==='lady') return {type,x,y,w:34,h:26,vx:50*(Math.random()<.5?-1:1),vy:0,dead:0,anim:Math.random()*2};
    if(type==='bee')  return {type,x,y,w:34,h:30,vx:70*(Math.random()<.5?-1:1),vy:0,baseY:y,t:Math.random()*6,dead:0,anim:0};
    return {type:'frog',x,y,w:34,h:30,vx:0,vy:0,onG:false,jt:Math.random()*1.5,dead:0,anim:0};
  }

  function solid(tx,ty){ if(tx<0||ty<0||tx>=cols||ty>=rows) return tx<0||tx>=cols; const g=grid[ty][tx]; return g==='#'||g==='c'; }
  function oneway(tx,ty){ if(ty<0||ty>=rows||tx<0||tx>=cols) return false; return grid[ty][tx]==='='; }
  function hazardTile(px,py){ const tx=(px/TILE)|0, ty=(py/TILE)|0; if(ty<0||ty>=rows||tx<0||tx>=cols)return false; const g=grid[ty][tx]; return g==='^'||g==='~'; }

  function startGame(){ levelIdx=0; score=0; hearts_n=3; loadLevel(); state='playing'; menu.classList.add('hidden'); over.classList.add('hidden'); }
  function loadLevel(){ parseLevel(levelIdx); time=0; }

  // ===== 충돌 =====
  function moveX(p,dx){
    p.x+=dx;
    const top=((p.y-p.h/2)/TILE)|0, bot=((p.y+p.h/2-1)/TILE)|0;
    if(dx>0){ const tx=((p.x+p.w/2)/TILE)|0; for(let ty=top;ty<=bot;ty++) if(solid(tx,ty)){ p.x=tx*TILE-p.w/2; p.vx=0; break; } }
    else if(dx<0){ const tx=((p.x-p.w/2)/TILE)|0; for(let ty=top;ty<=bot;ty++) if(solid(tx,ty)){ p.x=(tx+1)*TILE+p.w/2; p.vx=0; break; } }
  }
  function moveY(p,dy){
    const prevBot=p.y+p.h/2;
    p.y+=dy; p.onGround=false;
    const left=((p.x-p.w/2)/TILE)|0, right=((p.x+p.w/2-1)/TILE)|0;
    if(dy>0){ const ty=((p.y+p.h/2)/TILE)|0;
      for(let tx=left;tx<=right;tx++){
        if(solid(tx,ty)){ p.y=ty*TILE-p.h/2; p.vy=0; p.onGround=true; break; }
        if(oneway(tx,ty) && p.dropT<=0){ const top=ty*TILE; if(prevBot<=top+6 && (p.y+p.h/2)>=top){ p.y=top-p.h/2; p.vy=0; p.onGround=true; break; } }
      }
    } else if(dy<0){ const ty=((p.y-p.h/2)/TILE)|0; for(let tx=left;tx<=right;tx++) if(solid(tx,ty)){ p.y=(ty+1)*TILE+p.h/2; p.vy=0; break; } }
  }

  function hurt(){
    if(player.iframe>0) return;
    hearts_n--; player.iframe=1.2; player.vy=-360; player.vx=-player.face*180; playSnd('hurt',0.5);
    if(hearts_n<=0){ gameOver(false); }
  }
  function gameOver(win){
    state=win?'win':'dead';
    if(score>(best.score||0)){ best.score=score; localStorage.setItem('jumptrail_best',JSON.stringify({score:best.score})); bestScoreEl.textContent=(best.score||0).toLocaleString(); }
    setTimeout(()=>{ over.classList.remove('hidden');
      overTitle.textContent = win?'🏁 클리어!':'☠ 게임 오버'; overTitle.style.color=win?'#9ef07a':'#ff6b6b';
      overMsg.innerHTML='점수 <b style="color:#ffe14d">'+score.toLocaleString()+'</b>'+(win?' · 모든 레벨 완료!':' · 레벨 '+(levelIdx+1));
    },500);
    playSnd(win?'win':'hurt',0.6);
  }

  // ===== 업데이트 =====
  function update(dt){
    if(state!=='playing') return;
    time+=dt; flagAnim+=dt;
    const p=player;
    const left=keys['arrowleft']||keys['a']||btn.left, right=keys['arrowright']||keys['d']||btn.right;
    const jumpHeld=keys['arrowup']||keys['w']||keys[' ']||btn.jump, down=keys['arrowdown']||keys['s']||btn.down;
    const dir=(right?1:0)-(left?1:0);
    const RUN=300;
    p.vx += (dir*RUN - p.vx)*Math.min(1,dt*16);
    if(dir!==0) p.face=dir;
    p.duck = down && p.onGround;

    if(p.dropT>0)p.dropT-=dt;
    if(down && p.onGround && (keys['arrowup']||keys['w']||keys[' ']||btn.jump)) {} // reserved
    // 점프 버퍼/코요테
    if(p.onGround) p.coyote=0.09; else p.coyote-=dt;
    if(jumpHeld && !p._jp) p.jbuf=0.1; if(p.jbuf>0)p.jbuf-=dt;
    p._jp=jumpHeld;
    if(p.jbuf>0 && p.coyote>0){ 
      if(down){ p.dropT=0.2; } // 원웨이 아래로 통과
      else { p.vy=-720; p.coyote=0; p.jbuf=0; playSnd('jump',0.4,1+Math.random()*0.1); }
    }
    if(!jumpHeld && p.vy<0) p.vy*=0.86; // 가변 점프

    p.vy += 2000*dt; if(p.vy>980)p.vy=980;
    if(p.iframe>0)p.iframe-=dt;
    if(Math.abs(p.vx)>10 && p.onGround) p.anim+=dt*10;

    moveX(p, p.vx*dt);
    moveY(p, p.vy*dt);

    // 위험 타일 (발/몸 중심 체크)
    if(hazardTile(p.x,p.y) || hazardTile(p.x,p.y+p.h/2-4) || hazardTile(p.x-p.w/2+4,p.y) || hazardTile(p.x+p.w/2-4,p.y)) hurt();
    // 추락
    if(p.y-p.h/2>levelH+60){ hurt(); if(state==='playing'){ p.x=cam.x+100; p.y=60; p.vy=0; } }

    // 적
    for(const e of enemies){
      if(e.dead){ e.dead-=dt; continue; }
      if(e.type==='lady'){ moveEnemyX(e); }
      else if(e.type==='bee'){ e.t+=dt; e.x+=e.vx*dt; const tx=((e.x+(e.vx>0?e.w/2:-e.w/2))/TILE)|0, ty=(e.y/TILE)|0; if(solid(tx,ty)||e.x<TILE||e.x>levelW-TILE)e.vx*=-1; e.y=e.baseY+Math.sin(e.t*3)*16; e.anim+=dt*12; }
      else if(e.type==='frog'){ e.jt-=dt; e.vy+=2000*dt; e.y+=e.vy*dt; e.onG=false; const ty=((e.y+e.h/2)/TILE)|0,tx=(e.x/TILE)|0; if(solid(tx,ty)&&e.vy>0){ e.y=ty*TILE-e.h/2; e.vy=0; e.onG=true; } if(e.onG&&e.jt<=0){ e.vy=-560; e.vx=(player.x>e.x?1:-1)*90; e.jt=1.2+Math.random(); } e.x+=e.vx*dt; const txx=((e.x+(e.vx>0?e.w/2:-e.w/2))/TILE)|0; if(solid(txx,(e.y/TILE)|0))e.vx*=-1; }
      // 플레이어 충돌
      if(Math.abs(p.x-e.x)<(p.w+e.w)/2-4 && Math.abs(p.y-e.y)<(p.h+e.h)/2-4){
        if(p.vy>120 && (p.y) < e.y-2){ e.dead=0.4; p.vy=-460; score+=50; playSnd('disappear',0.5)||playSnd('bump',0.5); }
        else hurt();
      }
    }
    enemies=enemies.filter(e=>!(e.dead!==0 && e.dead<=0));

    // 수집
    for(const c of coins){ if(c.dead)continue; c.t+=dt; if(Math.abs(p.x-c.x)<28&&Math.abs(p.y-c.y)<30){ c.dead=true; score+=10; playSnd('coin',0.4,1+Math.random()*0.2); } }
    for(const g of gems){ if(g.dead)continue; g.t+=dt; if(Math.abs(p.x-g.x)<28&&Math.abs(p.y-g.y)<30){ g.dead=true; score+=50; playSnd('gem',0.5); } }
    for(const hh of hearts){ if(hh.dead)continue; hh.t+=dt; if(Math.abs(p.x-hh.x)<30&&Math.abs(p.y-hh.y)<32){ hh.dead=true; hearts_n=Math.min(5,hearts_n+1); playSnd('select',0.5); } }

    // 깃발
    if(flag && Math.abs(p.x-(flag.x+TILE/2))<TILE*0.6 && Math.abs(p.y-(flag.y+TILE/2))<TILE){ nextLevel(); }

    // 카메라
    const tx=p.x-W/2, ty=p.y-H*0.58;
    cam.x+=(tx-cam.x)*Math.min(1,dt*6); cam.y+=(ty-cam.y)*Math.min(1,dt*6);
    cam.x=Math.max(0,Math.min(levelW-W,cam.x)); cam.y=Math.max(-40,Math.min(levelH-H+10,cam.y));
  }
  function moveEnemyX(e){
    const dt=1/60; e.x+=e.vx*dt; e.anim+=dt*8;
    const aheadX=e.x+(e.vx>0?e.w/2+2:-e.w/2-2); const tx=(aheadX/TILE)|0, ty=(e.y/TILE)|0;
    const footTy=((e.y+e.h/2+4)/TILE)|0;
    if(solid(tx,ty) || !solid(tx,footTy)) e.vx*=-1; // 벽 or 낭떠러지에서 반전
  }

  function nextLevel(){
    playSnd('win',0.5); score+=200;
    levelIdx++;
    if(levelIdx>=LEVELS.length){ gameOver(true); }
    else { loadLevel(); }
  }

  // ===== 렌더 =====
  function drawTileSprite(name,dx,dy){ const im=IMG[name]; if(im)ctx.drawImage(im,dx,dy,TILE,TILE); }
  function tileFor(tx,ty){
    const g=grid[ty][tx];
    if(g==='#'){ const aE=!solid(tx,ty-1)&&!oneway(tx,ty-1); const lE=!solid(tx-1,ty); const rE=!solid(tx+1,ty);
      if(aE){ return lE?'g_tl':(rE?'g_tr':'g_top'); } return lE?'g_l':(rE?'g_r':'g_ctr'); }
    if(g==='c') return 'crate';
    return null;
  }
  function draw(){
    // 하늘 + 언덕 패럴럭스
    ctx.fillStyle='#8ec7ff'; ctx.fillRect(0,0,W,H);
    const hills=IMG['bg_hills']; if(hills){ const bw=256, scale=H/256, sw=bw*scale; const off=-(cam.x*0.3)%sw; for(let x=off-sw;x<W+sw;x+=sw) ctx.drawImage(hills,x,0,sw,H); }
    const clouds=IMG['bg_clouds']; if(clouds){ const sw=256*(H/256); const off=-(cam.x*0.15)%sw; ctx.globalAlpha=0.8; for(let x=off-sw;x<W+sw;x+=sw) ctx.drawImage(clouds,x,10,sw,H*0.6); ctx.globalAlpha=1; }

    if(!grid){ return; }
    ctx.save(); ctx.translate(-Math.round(cam.x),-Math.round(cam.y));
    const x0=Math.max(0,(cam.x/TILE)|0), x1=Math.min(cols-1,((cam.x+W)/TILE|0)+1);
    const y0=Math.max(0,(cam.y/TILE)|0), y1=Math.min(rows-1,((cam.y+H)/TILE|0)+1);
    for(let ty=y0;ty<=y1;ty++) for(let tx=x0;tx<=x1;tx++){
      const g=grid[ty][tx];
      if(g==='#'||g==='c'){ const t=tileFor(tx,ty); if(t)drawTileSprite(t,tx*TILE,ty*TILE); }
      else if(g==='='){ const lE=!oneway(tx-1,ty), rE=!oneway(tx+1,ty); drawTileSprite(lE?'pf_l':(rE?'pf_r':'pf_m'),tx*TILE,ty*TILE); }
      else if(g==='^'){ drawTileSprite('spikes',tx*TILE,ty*TILE); }
      else if(g==='~'){ const topLava=grid[ty-1]&&grid[ty-1][tx]==='~'; drawTileSprite(topLava?'lava':'lava_top',tx*TILE,ty*TILE); }
    }
    // 수집
    for(const c of coins){ if(c.dead)continue; const s=TILE*0.6, sc=Math.abs(Math.cos(c.t*4)); ctx.save(); ctx.translate(c.x,c.y+Math.sin(c.t*3)*3); ctx.scale(sc*0.6+0.4,1); const im=IMG['coin']; if(im)ctx.drawImage(im,-s/2,-s/2,s,s); ctx.restore(); }
    for(const g of gems){ if(g.dead)continue; const s=TILE*0.62; const im=IMG['gem']; if(im)ctx.drawImage(im,g.x-s/2,g.y-s/2+Math.sin(g.t*3)*3,s,s); }
    for(const hh of hearts){ if(hh.dead)continue; const s=TILE*0.6; const im=IMG['heart']; if(im)ctx.drawImage(im,hh.x-s/2,hh.y-s/2+Math.sin(hh.t*3)*3,s,s); }
    // 깃발
    if(flag){ const fa=(Math.floor(flagAnim*4)%2)?'flag_a':'flag_b'; const im=IMG[fa]; if(im)ctx.drawImage(im,flag.x,flag.y,TILE,TILE); }
    // 적
    for(const e of enemies){
      let name;
      if(e.type==='lady') name=e.dead?'lady_rest':(Math.floor(e.anim)%2?'lady1':'lady0');
      else if(e.type==='bee') name=Math.floor(e.anim)%2?'bee1':'bee0';
      else name=e.onG?'frog_idle':'frog_jump';
      const im=IMG[name]; if(im){ const s=TILE*0.78; ctx.save(); ctx.translate(e.x,e.y); if(e.vx>0)ctx.scale(-1,1); if(e.dead)ctx.globalAlpha=Math.max(0,e.dead/0.4); ctx.drawImage(im,-s/2,-s/2-4,s,s); ctx.restore(); } }
    // 플레이어
    drawPlayer();
    ctx.restore();
    drawHUD();
  }
  function drawPlayer(){
    const p=player; let name='p_idle';
    if(p.iframe>0 && p.vy<-100) name='p_hit'; else if(!p.onGround) name='p_jump'; else if(p.duck) name='p_duck';
    else if(Math.abs(p.vx)>20) name=(Math.floor(p.anim)%2?'p_walk1':'p_walk0');
    const im=IMG[name]; if(!im)return;
    const sw=58, sh=58;
    ctx.save(); ctx.translate(p.x, p.y+p.h/2 - sh/2 + 2); if(p.face<0)ctx.scale(-1,1);
    if(p.iframe>0 && (Math.floor(time*16)&1)) ctx.globalAlpha=0.5;
    ctx.drawImage(im,-sw/2,-sh/2,sw,sh); ctx.restore();
  }
  let time2=0;
  function drawHUD(){
    for(let i=0;i<Math.max(3,hearts_n);i++){ const full=i<hearts_n; const im=IMG[full?'hud_heart':'hud_heart_e']; if(im)ctx.drawImage(im,10+i*30,8,26,26); }
    const ci=IMG['hud_coin']; if(ci)ctx.drawImage(ci,W-118,8,26,26);
    ctx.fillStyle='#fff'; ctx.font='bold 22px sans-serif'; ctx.textAlign='left'; ctx.strokeStyle='#23314f'; ctx.lineWidth=4;
    ctx.strokeText(score.toLocaleString(),W-88,30); ctx.fillText(score.toLocaleString(),W-88,30);
    ctx.font='bold 13px sans-serif'; ctx.fillStyle='#ffe14d'; ctx.textAlign='center'; ctx.fillText('LEVEL '+(levelIdx+1)+'/'+LEVELS.length,W/2,26);
    ctx.textAlign='left';
    // 모바일 버튼
    if(isTouch){ drawBtn(60,H-60,'◀'); drawBtn(150,H-60,'▶'); drawBtn(W-70,H-70,'⤒'); drawBtn(W-150,H-50,'▼'); }
  }
  function drawBtn(x,y,t){ ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.beginPath(); ctx.arc(x,y,32,0,7); ctx.fill(); ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='24px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(t,x,y+1); ctx.textBaseline='alphabetic'; ctx.textAlign='left'; }

  // ===== 입력 =====
  let isTouch=false;
  window.addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))e.preventDefault(); });
  window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
  function rel(cx,cy){ const r=canvas.getBoundingClientRect(); return {x:(cx-r.left)*(W/r.width),y:(cy-r.top)*(H/r.height)}; }
  function setBtns(touches){ btn={left:false,right:false,jump:false,down:false}; for(const t of touches){ const p=rel(t.clientX,t.clientY);
    if(Math.hypot(p.x-60,p.y-(H-60))<44)btn.left=true; else if(Math.hypot(p.x-150,p.y-(H-60))<44)btn.right=true;
    else if(Math.hypot(p.x-(W-70),p.y-(H-70))<48)btn.jump=true; else if(Math.hypot(p.x-(W-150),p.y-(H-50))<44)btn.down=true; } }
  canvas.addEventListener('touchstart',e=>{ isTouch=true; setBtns(e.touches); },{passive:true});
  canvas.addEventListener('touchmove',e=>{ setBtns(e.touches); },{passive:true});
  canvas.addEventListener('touchend',e=>{ setBtns(e.touches); },{passive:true});
  canvas.addEventListener('touchcancel',e=>{ setBtns(e.touches); },{passive:true});

  let lastT=0;
  function loop(t){ const dt=Math.min(0.04, lastT?(t-lastT)/1000:0); lastT=t; time2+=dt; update(dt); draw(); requestAnimationFrame(loop); }

  playBtn.addEventListener('click',()=>{ try{ for(const k in SND){ SND[k].play().then(()=>{SND[k].pause();SND[k].currentTime=0;}).catch(()=>{});} }catch(e){} startGame(); });
  overBtn.addEventListener('click',startGame);

  function waitAssets(){ if(imgDone>=imgTotal){ loadingEl.style.display='none'; menu.classList.remove('hidden'); } else setTimeout(waitAssets,80); }
  waitAssets(); requestAnimationFrame(loop);

  // 테스트 훅
  if(typeof window!=='undefined'){
    window.__pf={ start:startGame, update, state:()=>({state,score,hearts:hearts_n,level:levelIdx,
        px:player&&player.x,py:player&&player.y,vy:player&&player.vy,onGround:player&&player.onGround,
        coins:coins.filter(c=>!c.dead).length, gems:gems.filter(g=>!g.dead).length, enemies:enemies.filter(e=>!e.dead).length}),
      _p:()=>player,_e:()=>enemies, keys, setP:o=>Object.assign(player,o), loadLevel, setLevelIdx:i=>{levelIdx=i;}, flagPos:()=>flag, LEVELS };
  }
})();
</script>
</body>
