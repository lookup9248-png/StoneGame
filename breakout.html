<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>네온 벽돌깨기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #0a0a14;
    color: #e8f6ff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  #hud {
    display: flex;
    gap: 22px;
    margin-bottom: 10px;
    font-size: 14px;
    letter-spacing: 1px;
  }
  #hud b { color: #fff; font-weight: 800; }
  #hud .l { color: #ffd60a; }
  #hud .s { color: #4af0c8; }
  #hud .v { color: #ff6b6b; }
  #wrap {
    position: relative;
    box-shadow: 0 0 40px rgba(74,240,200,0.18), inset 0 0 0 3px rgba(74,240,200,0.3);
    border-radius: 8px;
    overflow: hidden;
  }
  canvas {
    display: block;
    background: #06060d;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    touch-action: none;
  }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(6,6,13,0.88);
    text-align: center; gap: 14px;
    backdrop-filter: blur(2px);
    padding: 20px;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: 30px; color: #4af0c8;
    text-shadow: 0 0 14px rgba(74,240,200,0.7);
    -webkit-text-stroke: 1px rgba(0,0,0,0.6);
  }
  #overlay p { font-size: 14px; color: #9fb3c8; line-height: 1.6; }
  #playBtn {
    margin-top: 6px; padding: 12px 34px;
    background: #4af0c8; color: #06060d;
    border: 2px solid #06363a; border-radius: 999px;
    font-size: 16px; font-weight: 800; cursor: pointer;
    box-shadow: 0 0 22px rgba(74,240,200,0.5);
  }
  #playBtn:active { transform: scale(0.96); }
  #hint { margin-top: 12px; font-size: 12px; color: #5a6b7d; }
</style>
</head>
<body>
  <div id="hud">
    <div>SCORE <b class="s" id="score">0</b></div>
    <div>BEST <b id="best">0</b></div>
    <div>LIFE <b class="v" id="life">♥♥♥</b></div>
    <div>LV <b class="l" id="level">1</b></div>
  </div>
  <div id="wrap">
    <canvas id="game" width="480" height="640"></canvas>
    <div id="overlay">
      <h1>네온 벽돌깨기</h1>
      <p>공을 튕겨 모든 벽돌을 부수세요.<br>바닥에 떨어지면 생명이 줄어듭니다!</p>
      <button id="playBtn">▶ 시작</button>
    </div>
  </div>
  <div id="hint">← → / A D · 마우스 · 모바일은 드래그</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = canvas.width, H = canvas.height;

  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const lifeEl  = document.getElementById('life');
  const levelEl = document.getElementById('level');
  const overlay = document.getElementById('overlay');
  const playBtn = document.getElementById('playBtn');

  // ---- 화면 맞춤(캔버스 내부 해상도는 고정, CSS로만 축소) ----
  function fit() {
    const maxW = Math.min(window.innerWidth - 20, 480);
    const maxH = window.innerHeight - 130;
    const scale = Math.min(maxW / W, maxH / H, 1);
    canvas.style.width  = Math.round(W * scale) + 'px';
    canvas.style.height = Math.round(H * scale) + 'px';
  }
  window.addEventListener('resize', fit);
  fit();

  // ---- 색상 (쨍한 비비드 + 진한 외곽선) ----
  const OUTLINE = '#0a0a16';
  const ROW_COLORS = ['#ff3b3b','#ff9f1c','#ffd60a','#2ec4b6','#3a86ff','#b15cff'];
  const ROW_LIGHT  = ['#ff8e8e','#ffc578','#ffe85c','#7fe3d9','#8bb6ff','#d3a3ff'];

  // ---- 레이아웃 ----
  const COLS = 8, PAD = 20, GAP = 6, TOPY = 64, BRICK_H = 22;
  const BRICK_W = (W - PAD*2 - GAP*(COLS-1)) / COLS;

  // ---- 상태 ----
  let bricks, paddle, ball, score, best, lives, level, alive, started, particles, shake, launched;

  best = parseInt(localStorage.getItem('breakout_best') || '0', 10);
  bestEl.textContent = best;

  // ---- 효과음 ----
  let actx;
  function beep(freq, dur, type='square', vol=0.06) {
    try {
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type; o.frequency.value = freq; g.gain.value = vol;
      o.connect(g); g.connect(actx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
      o.stop(actx.currentTime + dur);
    } catch(e) {}
  }

  function makeBricks(rows) {
    const arr = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < COLS; c++) {
        arr.push({
          x: PAD + c * (BRICK_W + GAP),
          y: TOPY + r * (BRICK_H + GAP),
          w: BRICK_W, h: BRICK_H,
          color: ROW_COLORS[r % ROW_COLORS.length],
          light: ROW_LIGHT[r % ROW_LIGHT.length],
          alive: true
        });
      }
    }
    return arr;
  }

  function resetBallPaddle() {
    paddle = { w: 86, h: 16, x: W/2 - 43, y: H - 46, speed: 8 };
    const sp = 4.6 + level * 0.5;
    ball = { x: W/2, y: paddle.y - 10, r: 8, vx: 0, vy: 0, speed: sp };
    launched = false;
  }

  function newLevel() {
    const rows = Math.min(3 + level, ROW_COLORS.length);
    bricks = makeBricks(rows);
    resetBallPaddle();
  }

  function startGame() {
    score = 0; lives = 3; level = 1; alive = true; started = true;
    particles = []; shake = 0;
    newLevel();
    updateHud();
    overlay.classList.add('hidden');
    if (actx && actx.state === 'suspended') actx.resume();
  }

  function updateHud() {
    scoreEl.textContent = score;
    lifeEl.textContent = '♥'.repeat(Math.max(0, lives)) || '–';
    levelEl.textContent = level;
  }

  function launchBall() {
    if (launched) return;
    launched = true;
    const ang = (-Math.PI/2) + (Math.random()-0.5) * 0.6; // 위쪽 방향, 살짝 랜덤
    ball.vx = Math.cos(ang) * ball.speed;
    ball.vy = Math.sin(ang) * ball.speed;
    beep(520, 0.06, 'square', 0.05);
  }

  function addParticles(px, py, color, n=10) {
    for (let i=0;i<n;i++){
      particles.push({
        x: px, y: py,
        vx: (Math.random()-0.5)*5, vy:(Math.random()-0.5)*5,
        life: 1, color
      });
    }
  }

  function loseLife() {
    lives--;
    shake = 14;
    beep(120, 0.35, 'sawtooth', 0.08);
    updateHud();
    if (lives <= 0) return gameOver();
    resetBallPaddle();
  }

  function gameOver() {
    alive = false;
    if (score > best) { best = score; localStorage.setItem('breakout_best', String(best)); bestEl.textContent = best; }
    setTimeout(() => {
      overlay.classList.remove('hidden');
      overlay.querySelector('h1').textContent = '게임 오버';
      overlay.querySelector('p').innerHTML = `점수 <b style="color:#fff">${score}</b><br>최고기록 ${best}`;
      playBtn.textContent = '↻ 다시하기';
    }, 600);
  }

  function levelClear() {
    level++;
    beep(880, 0.12, 'square', 0.06);
    setTimeout(()=>beep(1180, 0.14, 'square', 0.06), 90);
    newLevel();
    updateHud();
  }

  // ---- 물리 업데이트 (작은 스텝으로 나눠 터널링 방지) ----
  function update() {
    if (!alive || !started) return;

    // 패들 키 이동
    if (keys.left)  paddle.x -= paddle.speed;
    if (keys.right) paddle.x += paddle.speed;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

    if (!launched) {
      ball.x = paddle.x + paddle.w/2;
      ball.y = paddle.y - ball.r - 2;
      return;
    }

    const steps = Math.ceil(Math.max(Math.abs(ball.vx), Math.abs(ball.vy)) / 4);
    const sx = ball.vx / steps, sy = ball.vy / steps;
    for (let s = 0; s < steps; s++) {
      ball.x += sx; ball.y += sy;

      // 좌우 벽
      if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); beep(440,0.03,'square',0.04); }
      if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); beep(440,0.03,'square',0.04); }
      // 천장
      if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); beep(440,0.03,'square',0.04); }
      // 바닥 → 생명 감소
      if (ball.y - ball.r > H) { loseLife(); return; }

      // 패들 충돌
      if (ball.vy > 0 &&
          ball.y + ball.r >= paddle.y &&
          ball.y + ball.r <= paddle.y + paddle.h + 8 &&
          ball.x >= paddle.x - ball.r &&
          ball.x <= paddle.x + paddle.w + ball.r) {
        ball.y = paddle.y - ball.r;
        const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2); // -1..1
        const ang = (-Math.PI/2) + hit * (Math.PI/3); // 최대 ±60도
        ball.vx = Math.cos(ang) * ball.speed;
        ball.vy = Math.sin(ang) * ball.speed;
        beep(640, 0.05, 'square', 0.05);
      }

      // 벽돌 충돌
      for (const b of bricks) {
        if (!b.alive) continue;
        if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
            ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
          b.alive = false;
          score += 10;
          updateHud();
          addParticles(b.x + b.w/2, b.y + b.h/2, b.color);
          beep(700 + (score % 12) * 20, 0.05, 'square', 0.06);
          // 침투 깊이로 반사축 결정
          const overlapL = (ball.x + ball.r) - b.x;
          const overlapR = (b.x + b.w) - (ball.x - ball.r);
          const overlapT = (ball.y + ball.r) - b.y;
          const overlapB = (b.y + b.h) - (ball.y - ball.r);
          const minX = Math.min(overlapL, overlapR);
          const minY = Math.min(overlapT, overlapB);
          if (minX < minY) ball.vx = -ball.vx; else ball.vy = -ball.vy;
          break;
        }
      }

      if (bricks.every(b => !b.alive)) { levelClear(); return; }
    }
  }

  // ---- 렌더 ----
  function draw() {
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
      shake *= 0.85; if (shake < 0.5) shake = 0;
    }

    // 배경 + 은은한 격자
    ctx.fillStyle = '#06060d';
    ctx.fillRect(-20,-20,W+40,H+40);
    ctx.strokeStyle = 'rgba(74,240,200,0.05)';
    ctx.lineWidth = 1;
    for (let x=0;x<=W;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y=0;y<=H;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    if (started && bricks) {
      // 벽돌 (쨍한 색 + 진한 외곽선 + 상단 하이라이트)
      for (const b of bricks) {
        if (!b.alive) continue;
        ctx.fillStyle = OUTLINE;
        ctx.fillRect(b.x, b.y, b.w, b.h);                 // 외곽선
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x+2, b.y+2, b.w-4, b.h-4);         // 본체
        ctx.fillStyle = b.light;
        ctx.fillRect(b.x+2, b.y+2, b.w-4, 4);             // 상단 하이라이트
      }

      // 패들
      ctx.fillStyle = OUTLINE;
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
      ctx.fillStyle = '#4af0c8';
      ctx.fillRect(paddle.x+2, paddle.y+2, paddle.w-4, paddle.h-4);
      ctx.fillStyle = '#bafff0';
      ctx.fillRect(paddle.x+2, paddle.y+2, paddle.w-4, 4);

      // 공 (외곽선 있는 픽셀 원)
      ctx.fillStyle = OUTLINE;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r+2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffd60a';
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff6b0';
      ctx.beginPath(); ctx.arc(ball.x - ball.r*0.3, ball.y - ball.r*0.3, ball.r*0.35, 0, Math.PI*2); ctx.fill();

      if (!launched) {
        ctx.fillStyle = '#9fb3c8';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('탭 / 스페이스로 발사', W/2, paddle.y - 30);
      }

      // 파티클
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.04;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
      }
      ctx.globalAlpha = 1;
      particles = particles.filter(p => p.life > 0);
    }

    ctx.restore();
  }

  // ---- 루프 ----
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // ---- 입력: 키보드 ----
  const keys = { left:false, right:false };
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k==='arrowleft'||k==='a') keys.left = true;
    else if (k==='arrowright'||k==='d') keys.right = true;
    else if (k===' ') { launchBall(); }
    if (['arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  });
  window.addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if (k==='arrowleft'||k==='a') keys.left = false;
    else if (k==='arrowright'||k==='d') keys.right = false;
  });

  // ---- 입력: 마우스 ----
  function pointerToCanvasX(clientX) {
    const rect = canvas.getBoundingClientRect();
    return (clientX - rect.left) * (W / rect.width);
  }
  canvas.addEventListener('mousemove', e => {
    if (!started || !alive) return;
    const x = pointerToCanvasX(e.clientX);
    paddle.x = Math.max(0, Math.min(W - paddle.w, x - paddle.w/2));
  });
  canvas.addEventListener('mousedown', () => launchBall());

  // ---- 입력: 터치 ----
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length) {
      const x = pointerToCanvasX(e.touches[0].clientX);
      if (started && alive) paddle.x = Math.max(0, Math.min(W - paddle.w, x - paddle.w/2));
    }
    launchBall();
  }, {passive:true});
  canvas.addEventListener('touchmove', e => {
    if (!started || !alive || !e.touches.length) return;
    const x = pointerToCanvasX(e.touches[0].clientX);
    paddle.x = Math.max(0, Math.min(W - paddle.w, x - paddle.w/2));
  }, {passive:true});

  // ---- 시작 ----
  playBtn.addEventListener('click', startGame);

  requestAnimationFrame(loop);

  // 헤드리스 테스트용으로 내부 상태 노출 (브라우저 동작엔 영향 없음)
  if (typeof window !== 'undefined') {
    window.__bk = {
      start: startGame, launch: launchBall, update,
      get: () => ({ score, lives, level, alive, started, launched,
                    bricksAlive: bricks ? bricks.filter(b=>b.alive).length : 0,
                    ball, paddle }),
      setBall: (o)=>Object.assign(ball,o),
      keys
    };
  }
})();
</script>
</body>
</html>
