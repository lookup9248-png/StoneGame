<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>도트매트릭스 테트리스</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#1d2410; color:#0f380f;
    font-family:"Courier New",monospace; overflow:hidden;
    display:flex; align-items:center; justify-content:center; user-select:none; }
  /* 게임보이 본체 */
  #gb { background:#c4cfa1; border-radius:14px 14px 40px 14px;
    padding:16px 16px 22px; box-shadow:0 10px 30px rgba(0,0,0,0.5), inset 0 2px 0 #e6edca;
    width:min(94vw,360px); }
  #brand { text-align:center; font-size:11px; letter-spacing:2px; color:#5a5f7a;
    font-weight:bold; margin-bottom:8px; }
  #brand b { color:#2a2d44; }
  /* 화면 베젤 */
  #screen { background:#2a2d20; border-radius:8px 8px 18px 8px; padding:14px 16px;
    box-shadow:inset 0 0 12px rgba(0,0,0,0.6); }
  #power { font-size:9px; color:#8b3a3a; letter-spacing:1px; margin-bottom:6px; }
  #power::before { content:'●'; color:#d24a3a; margin-right:4px; }
  #lcd { display:flex; gap:10px; }
  canvas { display:block; image-rendering:pixelated; background:#9bbc0f;
    border:3px solid #0f380f; }
  #side { display:flex; flex-direction:column; gap:9px; color:#9bbc0f; font-size:11px; }
  #side .box { border:2px solid #9bbc0f; padding:5px 6px; }
  #side .lbl { font-size:9px; letter-spacing:1px; opacity:0.8; }
  #side .val { font-size:15px; font-weight:bold; }
  #nextWrap { display:flex; flex-direction:column; align-items:center; gap:3px; }
  /* 컨트롤 */
  #controls { margin-top:14px; display:flex; align-items:center; justify-content:space-between; }
  #dpad { position:relative; width:96px; height:96px; }
  .dbtn { position:absolute; background:#3a3d2a; color:#9bbc0f; border:none;
    width:32px; height:32px; font-size:14px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 0 #20221a; }
  .dbtn:active { transform:translateY(1px); box-shadow:0 1px 0 #20221a; }
  #bUp{left:32px;top:0;border-radius:6px 6px 0 0;} #bDown{left:32px;top:64px;border-radius:0 0 6px 6px;}
  #bLeft{left:0;top:32px;border-radius:6px 0 0 6px;} #bRight{left:64px;top:32px;border-radius:0 6px 6px 0;}
  #dmid{left:32px;top:32px;width:32px;height:32px;background:#3a3d2a;position:absolute;}
  #ab { display:flex; gap:14px; align-items:center; }
  .rbtn { width:46px; height:46px; border-radius:50%; background:#8a2b4a; color:#fff;
    border:none; font-weight:bold; font-size:13px; box-shadow:0 3px 0 #5a1730; transform:rotate(-20deg); }
  .rbtn:active { transform:rotate(-20deg) translateY(2px); box-shadow:0 1px 0 #5a1730; }
  #startRow { margin-top:12px; display:flex; gap:18px; justify-content:center; }
  .sbtn { background:#52576b; color:#e6edca; border:none; font-size:9px; letter-spacing:1px;
    padding:5px 12px; border-radius:10px; transform:rotate(-20deg); box-shadow:0 2px 0 #2f3240; font-weight:bold; }
  .sbtn:active { transform:rotate(-20deg) translateY(1px); }
  #overlay { position:absolute; inset:0; background:rgba(15,56,15,0.92); color:#9bbc0f;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; padding:18px; }
  #overlay.hidden { display:none; }
  #overlay h1 { font-size:20px; letter-spacing:1px; }
  #overlay p { font-size:12px; line-height:1.7; }
  #playBtn { margin-top:6px; padding:9px 26px; background:#9bbc0f; color:#0f380f;
    border:none; border-radius:4px; font-weight:bold; font-size:14px; font-family:inherit; }
  #lcdWrap { position:relative; }
</style>
</head>
<body>
  <div id="gb">
    <div id="brand">DOT MATRIX <b>GAME</b></div>
    <div id="screen">
      <div id="power">BATTERY</div>
      <div id="lcd">
        <div id="lcdWrap">
          <canvas id="board" width="160" height="320"></canvas>
          <div id="overlay">
            <h1>TETRIS</h1>
            <p>블록을 쌓아 줄을 없애세요.<br>← → 이동 · ↑/A 회전<br>↓ 소프트드롭 · B 하드드롭</p>
            <button id="playBtn">▶ START</button>
          </div>
        </div>
        <div id="side">
          <div id="nextWrap" class="box">
            <span class="lbl">NEXT</span>
            <canvas id="next" width="56" height="56"></canvas>
          </div>
          <div class="box"><div class="lbl">SCORE</div><div class="val" id="score">0</div></div>
          <div class="box"><div class="lbl">LINES</div><div class="val" id="lines">0</div></div>
          <div class="box"><div class="lbl">LEVEL</div><div class="val" id="level">1</div></div>
          <div class="box"><div class="lbl">HI</div><div class="val" id="best">0</div></div>
        </div>
      </div>
    </div>
    <div id="controls">
      <div id="dpad">
        <button class="dbtn" id="bUp">↻</button>
        <button class="dbtn" id="bLeft">◀</button>
        <div id="dmid"></div>
        <button class="dbtn" id="bRight">▶</button>
        <button class="dbtn" id="bDown">▼</button>
      </div>
      <div id="ab">
        <button class="rbtn" id="bB">B</button>
        <button class="rbtn" id="bA">A</button>
      </div>
    </div>
    <div id="startRow">
      <button class="sbtn" id="bSelect">SELECT</button>
      <button class="sbtn" id="bStart">START</button>
    </div>
  </div>

<script>
(() => {
  const COLS = 10, ROWS = 20, CELL = 16;
  const board = document.getElementById('board');
  const bctx = board.getContext('2d');
  const nextC = document.getElementById('next');
  const nctx = nextC.getContext('2d');
  bctx.imageSmoothingEnabled = false; nctx.imageSmoothingEnabled = false;

  const scoreEl = document.getElementById('score');
  const linesEl = document.getElementById('lines');
  const levelEl = document.getElementById('level');
  const bestEl  = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const playBtn = document.getElementById('playBtn');

  // DMG 팔레트
  const C_BG = '#9bbc0f', C_GRID = '#8bac0f', C_DARK = '#0f380f', C_MID = '#306230', C_GHOST = '#6a8a1f';

  // 테트로미노 (스폰 모양 + 박스 크기)
  const PIECES = {
    I: { n:4, cells:[[1,0],[1,1],[1,2],[1,3]] },
    O: { n:2, cells:[[0,0],[0,1],[1,0],[1,1]] },
    T: { n:3, cells:[[0,1],[1,0],[1,1],[1,2]] },
    S: { n:3, cells:[[0,1],[0,2],[1,0],[1,1]] },
    Z: { n:3, cells:[[0,0],[0,1],[1,1],[1,2]] },
    J: { n:3, cells:[[0,0],[1,0],[1,1],[1,2]] },
    L: { n:3, cells:[[0,2],[1,0],[1,1],[1,2]] },
  };
  const KEYS = Object.keys(PIECES);

  let grid, cur, nextKey, bag, score, lines, level, over, started, dropAcc, dropInterval, lastT;
  let best = parseInt(localStorage.getItem('tetris_best') || '0', 10);
  bestEl.textContent = best;

  let actx;
  function beep(freq, dur, type='square', vol=0.05) {
    try {
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type=type; o.frequency.value=freq; g.gain.value=vol;
      o.connect(g); g.connect(actx.destination);
      o.start(); g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
      o.stop(actx.currentTime+dur);
    } catch(e){}
  }

  function emptyGrid() { return Array.from({length:ROWS}, ()=>Array(COLS).fill(0)); }

  function refillBag() { bag = KEYS.slice(); for(let i=bag.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [bag[i],bag[j]]=[bag[j],bag[i]]; } }
  function nextFromBag() { if(!bag || !bag.length) refillBag(); return bag.pop(); }

  function spawn() {
    const key = nextKey || nextFromBag();
    nextKey = nextFromBag();
    const p = PIECES[key];
    cur = { key, n:p.n, cells:p.cells.map(c=>c.slice()), px: ((COLS - p.n)/2)|0, py: -1 };
    if (collide(cur.px, cur.py, cur.cells)) { gameOver(); return false; }
    drawNext();
    return true;
  }

  function collide(px, py, cells) {
    for (const [r,c] of cells) {
      const x = px + c, y = py + r;
      if (x < 0 || x >= COLS || y >= ROWS) return true;
      if (y >= 0 && grid[y][x]) return true;
    }
    return false;
  }

  function rotateCells(cells, n) { return cells.map(([r,c]) => [c, n-1-r]); }

  function tryRotate() {
    if (!cur || over) return;
    if (cur.key === 'O') return;
    const rot = rotateCells(cur.cells, cur.n);
    for (const k of [0,-1,1,-2,2]) {
      if (!collide(cur.px + k, cur.py, rot)) { cur.cells = rot; cur.px += k; beep(440,0.03); return; }
    }
  }

  function move(dx) {
    if (!cur || over) return false;
    if (!collide(cur.px + dx, cur.py, cur.cells)) { cur.px += dx; beep(300,0.02); return true; }
    return false;
  }

  function softDrop() {
    if (!cur || over) return;
    if (!collide(cur.px, cur.py + 1, cur.cells)) { cur.py++; score += 1; updateHud(); }
    else lockPiece();
  }

  function hardDrop() {
    if (!cur || over) return;
    let d = 0;
    while (!collide(cur.px, cur.py + 1, cur.cells)) { cur.py++; d++; }
    score += d * 2; beep(180,0.05,'square',0.06);
    lockPiece();
  }

  function ghostY() {
    let gy = cur.py;
    while (!collide(cur.px, gy + 1, cur.cells)) gy++;
    return gy;
  }

  function lockPiece() {
    for (const [r,c] of cur.cells) {
      const x = cur.px + c, y = cur.py + r;
      if (y < 0) { gameOver(); return; }
      grid[y][x] = 1;
    }
    beep(140,0.04,'square',0.05);
    clearLines();
    if (!over) spawn();
  }

  function clearLines() {
    let cleared = 0;
    for (let y = ROWS - 1; y >= 0; y--) {
      if (grid[y].every(v => v)) {
        grid.splice(y, 1); grid.unshift(Array(COLS).fill(0));
        cleared++; y++;
      }
    }
    if (cleared > 0) {
      lines += cleared;
      const tbl = [0,100,300,500,800][cleared] || 800;
      score += tbl * level;
      const newLevel = 1 + Math.floor(lines / 10);
      if (newLevel !== level) { level = newLevel; dropInterval = Math.max(90, 800 - (level-1)*65); beep(880,0.12); }
      beep(cleared >= 4 ? 1000 : 660, 0.14, 'square', 0.07);
      updateHud();
    }
  }

  function updateHud() {
    scoreEl.textContent = score; linesEl.textContent = lines; levelEl.textContent = level;
    if (score > best) { best = score; localStorage.setItem('tetris_best', String(best)); bestEl.textContent = best; }
  }

  function gameOver() {
    over = true;
    beep(120,0.4,'sawtooth',0.07);
    setTimeout(() => {
      overlay.classList.remove('hidden');
      overlay.querySelector('h1').textContent = 'GAME OVER';
      overlay.querySelector('p').innerHTML = 'SCORE ' + score + '<br>LINES ' + lines + ' · HI ' + best;
      playBtn.textContent = '↻ RETRY';
    }, 300);
  }

  function start() {
    grid = emptyGrid(); score = 0; lines = 0; level = 1; over = false; started = true;
    dropInterval = 800; dropAcc = 0; lastT = 0; bag = null; nextKey = null;
    updateHud(); spawn();
    overlay.classList.add('hidden');
    if (actx && actx.state === 'suspended') actx.resume();
  }

  // ===== 렌더 =====
  function cellRect(g, x, y, size, shade) {
    g.fillStyle = C_DARK; g.fillRect(x, y, size, size);
    g.fillStyle = shade;  g.fillRect(x+1, y+1, size-2, size-2);
    g.fillStyle = C_DARK; g.fillRect(x+3, y+3, size-6, size-6);
    g.fillStyle = shade;  g.fillRect(x+4, y+4, size-8, size-8);
  }

  function draw() {
    if (!grid) { bctx.fillStyle = C_BG; bctx.fillRect(0,0,board.width,board.height); return; }
    bctx.fillStyle = C_BG; bctx.fillRect(0,0,board.width,board.height);
    bctx.strokeStyle = C_GRID; bctx.lineWidth = 1;
    for (let x=0;x<=COLS;x++){ bctx.beginPath(); bctx.moveTo(x*CELL+0.5,0); bctx.lineTo(x*CELL+0.5,ROWS*CELL); bctx.stroke(); }
    for (let y=0;y<=ROWS;y++){ bctx.beginPath(); bctx.moveTo(0,y*CELL+0.5); bctx.lineTo(COLS*CELL,y*CELL+0.5); bctx.stroke(); }

    for (let y=0;y<ROWS;y++) for (let x=0;x<COLS;x++) if (grid[y][x]) cellRect(bctx, x*CELL, y*CELL, CELL, C_MID);

    if (cur && !over) {
      const gy = ghostY();
      for (const [r,c] of cur.cells) {
        const x = (cur.px + c) * CELL, y = (gy + r) * CELL;
        if (gy + r >= 0) { bctx.strokeStyle = C_GHOST; bctx.lineWidth = 2; bctx.strokeRect(x+2, y+2, CELL-4, CELL-4); }
      }
      for (const [r,c] of cur.cells) {
        const yy = cur.py + r;
        if (yy >= 0) cellRect(bctx, (cur.px+c)*CELL, yy*CELL, CELL, C_MID);
      }
    }
  }

  function drawNext() {
    nctx.fillStyle = C_BG; nctx.fillRect(0,0,nextC.width,nextC.height);
    if (!nextKey) return;
    const p = PIECES[nextKey], sz = 12;
    let minc=9,maxc=-9,minr=9,maxr=-9;
    for (const [r,c] of p.cells){ minc=Math.min(minc,c); maxc=Math.max(maxc,c); minr=Math.min(minr,r); maxr=Math.max(maxr,r); }
    const w=(maxc-minc+1)*sz, h=(maxr-minr+1)*sz;
    const ox=(nextC.width-w)/2 - minc*sz, oy=(nextC.height-h)/2 - minr*sz;
    for (const [r,c] of p.cells) cellRect(nctx, ox+c*sz, oy+r*sz, sz, C_MID);
  }

  function loop(t) {
    if (started && !over) {
      if (!lastT) lastT = t;
      dropAcc += t - lastT; lastT = t;
      while (dropAcc >= dropInterval) { dropAcc -= dropInterval; if (!collide(cur.px, cur.py+1, cur.cells)) cur.py++; else { lockPiece(); break; } }
    } else { lastT = t; }
    draw();
    requestAnimationFrame(loop);
  }

  // ===== 입력 =====
  const repeatable = {};
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (!started) return;
    if (k==='arrowleft') move(-1);
    else if (k==='arrowright') move(1);
    else if (k==='arrowdown') softDrop();
    else if (k==='arrowup'||k==='a'||k==='x') tryRotate();
    else if (k==='z') tryRotate();
    else if (k===' '||k==='b') hardDrop();
    if (['arrowleft','arrowright','arrowdown','arrowup',' '].includes(k)) e.preventDefault();
  });

  function bind(id, fn){ const el=document.getElementById(id); const h=(e)=>{ e.preventDefault(); if(started) fn(); }; el.addEventListener('click',h); el.addEventListener('touchstart',h,{passive:false}); }
  bind('bLeft',()=>move(-1)); bind('bRight',()=>move(1)); bind('bDown',softDrop);
  bind('bUp',tryRotate); bind('bA',tryRotate); bind('bB',hardDrop);
  bind('bStart',()=>{ if(over||!started) start(); });

  // 스와이프 (보드 위)
  let ts=null;
  board.addEventListener('touchstart', e=>{ if(e.touches.length){ ts={x:e.touches[0].clientX,y:e.touches[0].clientY,t:Date.now()}; } }, {passive:true});
  board.addEventListener('touchend', e=>{
    if(!ts||!started) return;
    const c=e.changedTouches[0]; const dx=c.clientX-ts.x, dy=c.clientY-ts.y, dt=Date.now()-ts.t;
    if(Math.abs(dx)<14 && Math.abs(dy)<14 && dt<250){ tryRotate(); }
    else if(Math.abs(dx)>Math.abs(dy)){ move(dx>0?1:-1); }
    else if(dy>20){ if(dt<200) hardDrop(); else softDrop(); }
    ts=null;
  }, {passive:true});

  playBtn.addEventListener('click', start);
  requestAnimationFrame(loop);

  // 테스트 훅
  if (typeof window !== 'undefined') {
    window.__tt = {
      start, move, rotate:tryRotate, soft:softDrop, hard:hardDrop, spawn, lock:lockPiece,
      PIECES,
      state:()=>({score,lines,level,over,started,cur:cur&&{key:cur.key,px:cur.px,py:cur.py,cells:cur.cells.map(c=>c.slice())},
        filled: grid?grid.flat().filter(v=>v).length:0, grid}),
      setGrid:(g)=>{grid=g;}, setCur:(o)=>{cur=o;}, collide:(px,py,cells)=>collide(px,py,cells),
    };
  }
})();
</script>
</body>
</html>
